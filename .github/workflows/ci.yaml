name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: 硬化层检查
        run: bash eval/scripts/check_hardening.sh
      - name: 编译
        run: go build ./...
      - name: 静态分析
        run: go vet ./...

  smoke:
    needs: hardening
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: 冒烟测试
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: bash eval/scripts/run_core_smoke.sh
