# GitHub 开源雷达 v2.5 — 每日监控有价值开源项目
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: github_radar

steps:
  - id: search_go_kernel
    plugin: search_plugin
    type: web_search
    timeout: 30
    on_error: done
    inputs:
      query: "GitHub trending Go microkernel plugin framework 2026"
    next: search_llm_routing

  - id: search_llm_routing
    plugin: search_plugin
    type: web_search
    timeout: 30
    on_error: done
    inputs:
      query: "GitHub trending LLM routing agent orchestration framework 2026"
    next: search_python_tools

  - id: search_python_tools
    plugin: search_plugin
    type: web_search
    timeout: 30
    on_error: done
    inputs:
      query: "GitHub trending Python tool library subprocess plugin agent 2026"
    next: search_workflow

  - id: search_workflow
    plugin: search_plugin
    type: web_search
    timeout: 30
    on_error: done
    inputs:
      query: "GitHub trending workflow engine YAML DAG orchestration 2026"
    next: summarize

  - id: summarize
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        从以下四个方向的搜索结果中，筛选出对 beishan-core 项目有参考价值的开源项目。
        每个方向最多推荐 3 个项目，说明为什么值得关注。

        【Go 微内核/插件框架】
        ${steps.search_go_kernel.output}

        【LLM 路由/编排】
        ${steps.search_llm_routing.output}

        【Python 工具/插件】
        ${steps.search_python_tools.output}

        【工作流引擎】
        ${steps.search_workflow.output}
    next: save

  - id: save
    plugin: memory_plugin
    type: session_add
    timeout: 10
    on_error: done
    inputs:
      session_id: "github_radar"
      role: "system"
      type: "report"
      payload: "GitHub 雷达报告: ${steps.summarize.output}"
    next: report

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 30
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: "今日 GitHub 开源雷达报告已生成。\n${steps.summarize.output}"
