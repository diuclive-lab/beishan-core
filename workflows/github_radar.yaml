# GitHub 开源雷达 — 每日监控对 beishan-core 有价值的开源项目
#
# 触发方式（scheduler 定时发）:
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"github_radar"}}
#
# 各步骤说明:
#   1-4: 四个搜索方向，并行查询
#   5:   用 think_plugin 汇总并筛选出高价值项目
#   6:   结果存入 memory 存档
#   7:   推送通知（需配置 callback: 后启用）
id: github_radar

steps:
  - id: search_go_kernel
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "GitHub trending Go microkernel plugin framework 2026"

  - id: search_llm_routing
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "GitHub trending LLM routing agent orchestration framework 2026"

  - id: search_python_tools
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "GitHub trending Python tool library subprocess plugin agent 2026"

  - id: search_workflow
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "GitHub trending workflow engine YAML DAG orchestration 2026"

  - id: summarize
    plugin: think_plugin
    type: chat
    timeout: 120
    inputs:
      message: >-
        从以下四个方向的搜索结果中，筛选出对 beishan-core 项目有参考价值的开源项目。
        标准：和微内核架构、LLM 路由、Python 插件系统、工作流引擎相关，
        且 GitHub 星数增长快或设计理念新颖。
        每个方向最多推荐 3 个项目，说明为什么值得关注。

        搜索结果：

        【Go 微内核/插件框架】
        ${steps.search_go_kernel.output}

        【LLM 路由/编排】
        ${steps.search_llm_routing.output}

        【Python 工具/插件】
        ${steps.search_python_tools.output}

        【工作流引擎】
        ${steps.search_workflow.output}

  - id: save
    plugin: memory_plugin
    type: memory_add
    timeout: 10
    inputs:
      content: "GitHub 雷达报告: ${steps.summarize.output}"

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 30
    inputs:
      message: "今日 GitHub 开源雷达报告已生成。\n${steps.summarize.output}"
