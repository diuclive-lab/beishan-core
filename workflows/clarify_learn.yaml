# 澄清学习工作流 v2.5 — 结构化 clarify → 入库形成学习闭环
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: clarify_learn
output_target: chat
steps:
  - id: ask
    plugin: memory_plugin
    type: clarify
    timeout: 30
    on_error: done
    inputs:
      message: "${input}"
      format: "structured"
    next: learn

  - id: learn
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "clarify_response"
      title: "澄清记录: ${input}"
      summary: "${steps.ask.output}"
