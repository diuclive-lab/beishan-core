# 周报复盘 v2.5 — 每周聚类主题，生成下步建议
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: weekly_review

steps:
  - id: list_knowledge
    plugin: memory_plugin
    type: knowledge_list
    timeout: 15
    on_error: done
    inputs: {}
    next: list_todos

  - id: list_todos
    plugin: todo_plugin
    type: todo_list
    timeout: 10
    on_error: done
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    retry_delay: 2
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于本周知识库和待办数据生成复盘报告。

        ## 本周概况
        ## 主题聚类
        ## 待办状态
        ## 差距与机会
        ## 下步建议

        知识条目：
        ${steps.list_knowledge.output}

        待办事项：
        ${steps.list_todos.output}
    next: save_review

  - id: save_review
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "note"
      title: "周复盘"
      summary: "${steps.analyze.output}"
      tags: '["weekly-review"]'
      topics: '["review"]'
      content: "${steps.analyze.output}"
    next: notify

  - id: notify
    plugin: notify_plugin
    type: notify_send
    timeout: 15
    on_error: done
    inputs:
      channel: email
      subject: "beishan-core 周报"
      message: "本周知识复盘报告:

${steps.analyze.output}"
