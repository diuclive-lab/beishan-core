# 周报复盘 — 每周复盘，聚类主题，生成下步建议
#
# 流程：
#   1. list_knowledge:  获取最近知识条目
#   2. list_todos:      获取当前待办
#   3. analyze:         DeepSeek 聚类分析 → 输出周报
#   4. save_review:     周报本身作为知识条目入库
#   5. notify:          邮件推送（可选）
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"weekly_review","input":"7"}}
#    input 设为天数（留空=全部，7=本周，30=本月）

id: weekly_review

steps:
  - id: list_knowledge
    plugin: memory_plugin
    type: knowledge_list
    timeout: 15
    inputs: {}
    next: list_todos

  - id: list_todos
    plugin: todo_plugin
    type: todo_list
    timeout: 10
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    retry_delay: 2
    inputs:
      message: >-
        你是一个个人知识助理，请基于本周知识库和待办数据生成一份复盘报告。

        格式要求：
        ## 本周概况
        - 新增条目数、主要类型、集中主题

        ## 主题聚类
        - 按 tag/topic 分类，每个主题列出代表条目

        ## 待办状态
        - 当前待办总数、已完成、未完成
        - 关键未完成事项

        ## 差距与机会
        - 哪些方向记录不足
        - 建议下关注什么

        ## 下步建议
        - 3-5 条可执行建议（基于待办和知识缺口）

        ===== 知识条目 =====
        ${steps.list_knowledge.output}

        ===== 待办事项 =====
        ${steps.list_todos.output}
    next: save_review

  - id: save_review
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    inputs:
      source_type: "note"
      title: "周复盘"
      summary: "${steps.analyze.output}"
      tags: '["weekly-review"]'
      topics: '["review"]'
      content: "${steps.analyze.output}"
    next: notify

  - id: notify
    plugin: notify_plugin
    type: notify_send
    timeout: 15
    on_error: done
    inputs:
      channel: email
      subject: "beishan-core 周报"
      message: "本周知识复盘报告:\n\n${steps.analyze.output}"
