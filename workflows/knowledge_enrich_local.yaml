# 知识条目增强（本地模型版）v2.5
#
# 与 knowledge_enrich 功能相同，provider=local
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: knowledge_enrich_local

steps:
  - id: get
    plugin: memory_plugin
    type: knowledge_get
    timeout: 10
    on_error: done
    inputs:
      id: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    provider: deepseek
    timeout: 300
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个知识管理助手。分析以下知识条目，输出改进后的结构化信息。

        当前条目：
        ${steps.get.output}

        输出 JSON：
        {
          "title": "标题",
          "summary": "改进后的摘要（50字内）",
          "tags": ["标签1", "标签2", "标签3"],
          "topics": ["主题1"],
          "changed": true
        }

        如果条目质量已经足够好，不需要修改，输出：
        {"changed": false}
    next: update

  - id: update
    plugin: memory_plugin
    type: knowledge_update
    timeout: 15
    skip_if: "steps.analyze.output.changed == 'false'"
    on_error: done
    inputs:
      id: "${input}"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
