# 代码深度分析 v2.5 — 移植外科医生（静态度量 + 合并方案）
#
# 设计原则：
#   - 静态度量优先：用 Go 工具产出精确数据，让 AI 从"猜测"变为"测量"
#   - 全 API 调用：DeepSeek 统一处理分析与战略，减少本地依赖，速度更快
#   - 合并导向：每步分析都直指合并到 beishan-core 的具体冲突和适配点
#   - 证据驱动：所有决策标注证据等级（E1-E4）
#   - 硬化层感知：在逐文件阶段主动评估安全风险，产出硬化层增强点建议
#   - 缺口可见：记录什么没分析、为什么跳过
#   - 闭环落地：分析结果 → 知识库 → 待办事项，不只是报告
#
# v2.5 升级：
#   - Step 1-2: terminal_plugin → memory_plugin（调用 L3 Go 工具）
#   - Step 6:    synthesize 新增 evidence 标注 + risk_register
#   - Step 2.5:  gap_analysis 新增 partial_failure 路径
#   - 引用 docs/ABSORPTION_GOVERNANCE.md 治理框架
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1
#   - 风险分类       → docs/ABSORPTION_GOVERNANCE.md §3
#   - 升级策略       → docs/ABSORPTION_GOVERNANCE.md §4
#
# 触发方式：
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"code_deep_analyze","input":"/绝对路径/到/项目目录"}}

id: code_deep_analyze
output_target: chat

steps:

  # ═══════════════════════════════════════════════════════════
  # 阶段一：静态扫描（终端命令 — 可选 Go 工具见各步骤注释）
  # ═══════════════════════════════════════════════════════════

  # ── Step 1: 扫描文件树 ──────────────────────────────────
  # 调用：code_tree(list_files=true, lang=go,py)
  # 输出：结构化 JSON（文件路径列表 + 语言 + 行数）
  - id: scan_tree
    plugin: memory_plugin
    type: code_tree
    timeout: 20
    on_error: scan_tree_fallback
    inputs:
      root: "${input}"
      list_files: true
      lang: "go,py"
    next: static_metrics

  # 降级：终端命令扫描（Go 工具不可用时）
  - id: scan_tree_fallback
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 30
    on_error: done
    inputs:
      command: >-
        echo "=== GO FILES ===" && /usr/bin/find ${input} -name '*.go' -not -path '*/vendor/*' -not -name '*_test.go' -not -path '*/.git/*' -not -path '*/generated/*' | sort | head -100 && echo "=== PYTHON FILES ===" && /usr/bin/find ${input} -name '*.py' -not -path '*/vendor/*' -not -name 'test_*' -not -path '*/__pycache__/*' -not -path '*/.git/*' | sort | head -50 && echo "=== GO MOD ===" && cat ${input}/go.mod 2>/dev/null | head -30 || cat ${input}/requirements.txt 2>/dev/null | head -30 || echo "(no mod file)"
    next: static_metrics

  # ── Step 2: 并行静态度量（3 路同时跑） ─────────────────
  # 调用：code_stats(list_files=true) / go_struct_scan(root=)
  - id: static_metrics
    on_error: runtime_anatomy
    next: runtime_anatomy
    type: parallel
    timeout: 45
    steps:

      # 度量 A: 文件行数与体量分布
      # 返回 top-30 文件行数排行
      - id: lines
        plugin: memory_plugin
        type: code_stats
        inputs:
          root: "${input}"
          list_files: true
          limit: 30

      # 度量 B: 导出符号 + 类型统计
      # 返回 AST 级精确的 types/functions/exports
      - id: exports
        plugin: memory_plugin
        type: go_struct_scan
        inputs:
          root: "${input}"

      # 度量 C: 包依赖频率分析
      # 返回 top-40 import 路径及其引用次数
      - id: imports
        plugin: memory_plugin
        type: go_struct_scan
        inputs:
          root: "${input}"
          import_limit: 40


  # ═══════════════════════════════════════════════════════════
  # 阶段二：战略选文件 + 运行时解剖
  # ═══════════════════════════════════════════════════════════

  # ── Step 2.7: 动态行为解剖（轻量版 runtime analysis）──
  # 源码只能看到 static structure，runtime 行为需要额外观察
  - id: runtime_anatomy
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 15
    on_error: select_files
    inputs:
      command: >-
        echo "=== GOROUTINE USAGE ===" && grep -rn --include='*.go' 'go func\|sync\.WaitGroup\|sync\.Mutex\|sync\.RWMutex\|time\.After\|time\.Tick' ${input} | grep -v vendor | grep -v '_test.go' | head -30 && echo "=== TIMEOUT PATTERNS ===" && grep -rn --include='*.go' 'context\.WithTimeout\|\.SetDeadline\|timeout\|TimeOut' ${input} | grep -v vendor | grep -v '_test.go' | head -20 && echo "=== SHUTDOWN/CLEANUP ===" && grep -rn --include='*.go' 'func.*Close\|func.*Shutdown\|func.*Cleanup\|defer.*\.Close()' ${input} | grep -v vendor | grep -v '_test.go' | head -15
    next: select_files

  # ── Step 3: DeepSeek 选出核心文件 ──────────────────────
  # 输入：文件树 + 行数分布 + 导出符号 + 依赖图 + runtime 分析
  # 输出：10-15 个精选文件，含绝对路径和优先级
  - id: select_files
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 120
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一位 Go/Python 项目架构师，正在评估一个开源项目，准备将其部分模块合并到
        beishan-core（一个微内核 + 硬化层 + 工作流编排的 AI 代理框架）。

        根据以下静态度量数据和 runtime 分析，选出最值得深度分析的 10-15 个核心文件。
        必须输出严格 JSON（不加任何其他文字、不加 markdown 代码块）：

        {
          "project_name": "项目名（从文件路径推断）",
          "project_type": "agent框架/工具库/Web服务/CLI/混合",
          "primary_language": "Go/Python/混合",
          "architecture_guess": "基于度量数据的初步架构判断（60字内）",
          "dependency_conflicts": "与 beishan-core 可能冲突的依赖（从 go.mod 观察）",
          "core_files": [
            {
              "path": "文件的完整绝对路径（必须与文件树中完全一致）",
              "role": "架构角色（10字内，如：决策引擎/工具注册表/IPC层/数据模型）",
              "reason": "为什么值得分析，与 beishan-core 的关联（一句话）",
              "priority": 1,
              "estimated_lines": 0
            }
          ],
          "skip_reason": "跳过了哪类文件（测试/生成代码/样例）",
          "runtime_concerns": "从 goroutine/timeout/cleanup 分析中观察到的潜在风险（无则 none）"
        }

        选择优先级：
        1. P1：入口/初始化（main.go/cmd//__init__.py）
        2. P1：核心接口定义（interface/abstract class）
        3. P2：路由/注册/分发逻辑
        4. P2：数据模型/存储结构
        5. P3：最重的业务实现（按行数度量）

        ── 项目路径 ──
        ${input}

        ── 文件树 ──
        ${steps.scan_tree.output}

        ── 行数分布（最重的文件）──
        ${steps.static_metrics.output.lines}

        ── 导出符号（接口与类型边界）──
        ${steps.static_metrics.output.exports}

        ── 包依赖频率（高频=核心枢纽）──
        ${steps.static_metrics.output.imports}

        ── 运行时分析（goroutine/timeout/cleanup）──
        ${steps.runtime_anatomy.output}
    next: read_files

  # ═══════════════════════════════════════════════════════════
  # 阶段三：逐文件分析
  # ═══════════════════════════════════════════════════════════

  # ── Step 4: 批量读取源文件内容 ──────────────────────────
  # Go 替代：code_read_external(paths=[...], max_lines=250)
  - id: read_files
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 30
    on_error: analyze_files
    batch:
      foreach: "${steps.select_files.output.core_files}"
      parallel: true
      concurrency: 5
    inputs:
      command: >-
        echo '=== FILE: ${item.path} | ROLE: ${item.role} | PRIORITY: ${item.priority} ===' &&
        cat '${item.path}' 2>/dev/null | head -250 ||
        echo '[文件不存在或无权限]'
    next: analyze_files

  # ── Step 5: DeepSeek 全量逐文件分析 ──
  # 将所有 cat 结果一次性交给 DeepSeek 逐文件分析
  # 对每个文件的关键设计决策必须标注证据等级（E1-E4）
  - id: analyze_files
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 600
    retry: 1
    retry_delay: 10
    on_error: gap_analysis
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一位代码分析专家，目标是评估将以下项目模块合并到 beishan-core 的可行性。
        beishan-core 是一个 Go 微内核 + 硬化层 + 工作流编排 + 知识管理系统。

        以下是从目标项目读取的核心源文件内容（按优先级排列）。
        请对每个文件独立分析，输出严格 JSON 数组（每个元素对应一个文件，不加任何其他文字）：

        [
          {
            "file": "文件路径",
            "role": "架构角色（10字内）",
            "types": [
              {"name": "类型名", "kind": "struct/interface/func/class", "purpose": "一句话"}
            ],
            "key_exports": ["核心公开函数/方法（最多8个）"],
            "external_deps": ["依赖的第三方库（不含标准库）"],
            "complexity": "low/medium/high",
            "beishan_compat": {
              "drop_in": ["可直接复制使用的函数/类型"],
              "needs_adapter": ["需要适配层（说明冲突原因）"],
              "incompatible": ["不可合并的逻辑（说明为什么）"]
            },
            "security_risks": ["路径穿越/命令注入/硬编码密钥等风险（无则空数组）"],
            "hardening_notes": "需在 beishan-core 硬化层增加的校验（无则 none）",
            "merge_priority": "high/medium/low",
            "merge_notes": "命名冲突/接口签名差异/初始化顺序等注意事项（一句话）",
            "key_decisions": [
              {
                "statement": "关键设计决策描述",
                "evidence": "E1/E2/E3/E4（参见 docs/ABSORPTION_GOVERNANCE.md §1）",
                "source": "源码行号/commit/推断理由"
              }
            ]
          }
        ]

        项目路径：${input}
        DeepSeek 初步判断：${steps.select_files.output.architecture_guess}
        runtime 关注点：${steps.select_files.output.runtime_concerns}

        ── 源文件内容（分隔线分割各文件）──
        ${steps.read_files.output}
    next: synthesize

  # ═══════════════════════════════════════════════════════════
  # 阶段四：综合 + 缺口分析
  # ═══════════════════════════════════════════════════════════

  # ── Step 6: DeepSeek 综合架构 + 合并计划 ────────────────
  - id: synthesize
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    on_error: gap_analysis
    inputs:
      mode: "no_retrieval"
      message: >-
        你是 beishan-core 的架构师（微内核 + 硬化层 L1-L4 + 工作流编排 + 知识管理）。
        基于以下完整分析数据，输出：
        ① 项目架构全景
        ② 可执行的"外科手术合并方案"

        必须输出严格 JSON（不加任何其他文字）：

        {
          "project": "项目名",
          "type": "项目类型",
          "summary": "核心思想与定位（100字内）",

          "layers": [
            {
              "name": "层名（如：微内核层/工具层/插件层/存储层/Web层）",
              "files": ["属于该层的文件路径"],
              "maturity": "骨架/半成品/完整",
              "key_types": ["核心类型名"]
            }
          ],

          "data_flow": "核心数据流路径（一句话，如：请求→路由→插件→工具→存储→响应）",

          "strengths": [
            "值得吸收的设计（最多5条，每条说明能给 beishan-core 带来什么价值）"
          ],

          "gaps": [
            "缺失或不完善的部分（最多5条）"
          ],

          "merge_plan": {
            "dependency_conflicts": [
              {
                "lib": "冲突的第三方库名",
                "their_version": "对方版本",
                "our_version": "beishan-core 版本（如未使用则填 none）",
                "resolution": "建议处理方式",
                "evidence": "E1/E2/E3/E4",
                "source": "源码行号"
              }
            ],
            "naming_conflicts": [
              {
                "symbol": "重名的类型/函数名",
                "resolution": "重命名建议",
                "evidence": "E1/E2/E3/E4",
                "source": "源码行号"
              }
            ],
            "adapter_design": [
              {
                "their_interface": "对方的接口签名",
                "our_interface": "beishan-core 对应接口签名",
                "adapter_sketch": "适配层代码草案（伪代码，10-20行）",
                "evidence": "E1/E2/E3/E4（参见 docs/ABSORPTION_GOVERNANCE.md §1）",
                "source": "源码行号/commit/推断理由"
              }
            ],
            "hardening_additions": [
              {
                "rule": "具体的安全规则描述",
                "evidence": "E1/E2/E3/E4",
                "source": "源码行号/推断理由"
              }
            ],
            "migration_order": [
              "按低风险优先的迁移步骤顺序（如：1.先复制 types.go 接口定义，2.再迁移工具实现，3.最后对接路由层）"
            ],
            "test_recommendations": [
              "合并后应新增的测试用例（具体行为描述）"
            ],
            "risk_register": [
              {
                "risk": "风险描述",
                "category": "correctness/compatibility/performance/security/operability/dependency",
                "severity": "low/medium/high/critical",
                "mitigation": "应对措施",
                "status": "open/resolved/accepted"
              }
            ],
            "estimated_effort": "预估合并工作量（人天或描述）",
            "risk_level": "low/medium/high",
            "recommendation": "最终合并建议：全量合并/选择性提取/仅参考设计/不建议合并（并说明理由）"
          }
        }

        ── 逐文件分析结果 ──
        ${steps.analyze_files.output}

        ── 静态度量：导出符号 ──
        ${steps.static_metrics.output.exports}

        ── 初步判断 ──
        ${steps.select_files.output.architecture_guess}
        依赖冲突初判：${steps.select_files.output.dependency_conflicts}
    next: gap_analysis

  # ── gap_analysis: 缺口 + 终止条件 ────────────────────
  # 记录什么没分析、为什么跳过、以及是否因部分失败而终止
  - id: gap_analysis
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: save_knowledge
    inputs:
      mode: "no_retrieval"
      message: >-
        根据以下分析结果，列出本次分析未覆盖的部分及其原因。
        输出严格 JSON：

        {
          "skipped_areas": [
            {
              "area": "未分析的区域（如：测试套件/构建脚本/文档）",
              "reason": "为什么跳过",
              "impact": "不分析的后果（低/中/高）",
              "followup": "后续是否需要补充分析"
            }
          ],
          "depth_limitations": [
            {
              "file": "受限于分析深度的文件",
              "limit": "行数限制/分析深度/权限限制",
              "potential_missed": "可能遗漏了什么"
            }
          ],
          "partial_failure": "是否有步骤超时或失败（true/false）。如果为 true，结果可能不完整。",
          "partial_failure_detail": "哪些步骤失败了、影响什么",
          "total_source_files": 0,
          "files_analyzed": 0,
          "coverage_pct": 0.0
        }

        项目：${steps.synthesize.output.project}
        类型：${steps.synthesize.output.type}
        建议：${steps.synthesize.output.merge_plan.recommendation}
        文件树：${steps.scan_tree.output}
    next: save_knowledge

  # ═══════════════════════════════════════════════════════════
  # 阶段五：知识入库 + 洞察闭环
  # ═══════════════════════════════════════════════════════════

  # ── Step 8: 知识入库 ────────────────────────────────────
  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: followup
    inputs:
      source_type: "code"
      title: "${steps.synthesize.output.project} 深度合并分析（v2 手术方案）"
      summary: >-
        ${steps.synthesize.output.summary} |
        风险等级: ${steps.synthesize.output.merge_plan.risk_level} |
        建议: ${steps.synthesize.output.merge_plan.recommendation}
      tags:
        - "${steps.select_files.output.project_type}"
        - "架构分析"
        - "${steps.select_files.output.primary_language}"
        - "合并方案"
        - "全 API 分析"
      topics:
        - "代码合并"
        - "架构"
        - "硬化层"
      raw_ref: "${input}"
      content: >-
        项目: ${steps.synthesize.output.project}
        类型: ${steps.synthesize.output.type}
        数据流: ${steps.synthesize.output.data_flow}

        === 架构层次 ===
        ${steps.synthesize.output.layers}

        === 优势（值得吸收）===
        ${steps.synthesize.output.strengths}

        === 差距 ===
        ${steps.synthesize.output.gaps}

        === 缺口分析 ===
        未覆盖区域: ${steps.gap_analysis.output.skipped_areas}
        深度限制: ${steps.gap_analysis.output.depth_limitations}
        覆盖率: ${steps.gap_analysis.output.coverage_pct}%

        === 合并方案 ===
        依赖冲突: ${steps.synthesize.output.merge_plan.dependency_conflicts}
        命名冲突: ${steps.synthesize.output.merge_plan.naming_conflicts}
        迁移顺序: ${steps.synthesize.output.merge_plan.migration_order}
        硬化层增强: ${steps.synthesize.output.merge_plan.hardening_additions}
        工作量: ${steps.synthesize.output.merge_plan.estimated_effort}
        风险等级: ${steps.synthesize.output.merge_plan.risk_level}
        最终建议: ${steps.synthesize.output.merge_plan.recommendation}

        === 静态度量原始数据 ===
        行数分布: ${steps.static_metrics.output.lines}
    next: followup

  # ── Step 9: 洞察跟进 — 高价值建议自动转待办 ──────────
  - id: followup
    plugin: workflow_plugin
    type: workflow_run
    timeout: 120
    on_error: done
    inputs:
      workflow: "insight_followup"
      input: "${steps.save_knowledge.output.id}"
    next: done

  # ── Step 10: 完成报告 ─────────────────────────────────
  - id: done
    plugin: think_plugin
    type: chat
    timeout: 30
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        为以下项目分析结果生成一份简洁的执行摘要（中文，200字以内），
        包含：①项目定位，②最大合并价值，③最高风险点，④建议下一步行动。

        项目：${steps.synthesize.output.project}
        类型：${steps.synthesize.output.type}
        总结：${steps.synthesize.output.summary}
        优势：${steps.synthesize.output.strengths}
        风险等级：${steps.synthesize.output.merge_plan.risk_level}
        最终建议：${steps.synthesize.output.merge_plan.recommendation}
        迁移步骤：${steps.synthesize.output.merge_plan.migration_order}
        硬化层增强：${steps.synthesize.output.merge_plan.hardening_additions}
        缺口覆盖率：${steps.gap_analysis.output.coverage_pct}%
