# 通用内容审核 — 挖金子：评估→过滤→入库洞察
#
# 所有内容都会出完整评估报告，action 决定额外行为：
#   discard: quality<3 → 出报告 + 标记已过滤（不入库不污染）
#   report:  quality>=3但relevance<3 → 出报告（已评估，未入库）
#   store:   quality>=3且relevance>=3 → 出报告 + 提炼洞察 + 确认后入库
#
# 触发方式：
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"content_review","input":"<URL>"}}

id: content_review

steps:
  # ── Step 1: 获取内容（web_render 通用入口） ──
  - id: fetch
    plugin: search_plugin
    type: web_render
    timeout: 60
    inputs:
      url: "${input}"
      wait: 5
    next: classify

  # ── Step 2: 内容分类 ──
  - id: classify
    plugin: think_plugin
    type: chat
    timeout: 120
    retry: 1
    inputs:
      mode: "no_retrieval"
      message: >-
        分析内容输出 JSON。

        source_category: knowledge|news|promotion|opinion|tutorial|video

        { "title": "", "source": "", "source_category": "", "content_type": "",
          "core_idea": "", "summary": "", "tags": [], "search_queries": [] }

        内容：${steps.fetch.output}
    next: cross_check

  # ── Step 3: 全网交叉验证 ──
  - id: cross_check
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "${steps.classify.output.search_queries[0]}"
    next: kb_check

  # ── Step 4: 知识库检索 ──
  - id: kb_check
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    inputs:
      keyword: "${steps.classify.output.core_idea}"
    next: evaluate

  # ── Step 5: 核心步骤 — 评估 + 洞察提炼 ──
  - id: evaluate
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    inputs:
      mode: "no_retrieval"
      message: >-
        你是评估+提炼助手。评估内容质量和项目相关度，双评分 0-5。

        quality_score（内容质量）：
          0=纯噪音 1=低质 2=一般
          3=有参考价值 4=高质量有洞见 5=顶级

        relevance_score（项目相关度）：
          0=无关 1=弱 2=一般
          3=相关可参考 4=直接有借鉴 5=核心必须入库

        action 取值：
          discard: quality<3 → 出报告标记已过滤，不入库
          report:  quality>=3但relevance<3 → 出报告已评估未入库
          store:   quality>=3且relevance>=3 → 提炼洞察入库

        store 时需提炼 actionable insights（文章对 beishan-core 可借鉴的工程思路）。
        不是原文摘要，是可执行的知识。

        输出 JSON：
        {
          "quality_score": 0,
          "quality_reason": "",
          "relevance_score": 0,
          "relevance_reason": "",
          "action": "discard|report|store",
          "action_reason": "",
          "insight_title": "store时必填",
          "insight_summary": "store时必填",
          "insight_tags": [],
          "report": {
            "title": "",
            "type": "",
            "core_idea": "",
            "quality": "",
            "relevance": "",
            "web_verify": "",
            "kb_check": "",
            "verdict": ""
          }
        }

        标题：${steps.classify.output.title}
        来源：${steps.classify.output.source}
        类型：${steps.classify.output.source_category} / ${steps.classify.output.content_type}
        核心观点：${steps.classify.output.core_idea}
        摘要：${steps.classify.output.summary}
        标签：${steps.classify.output.tags}

        全网验证：${steps.cross_check.output}
        已有知识：${steps.kb_check.output}
    next: auto_store

  # ── Step 6: 自动入库（仅 action=store 时执行） ──
  - id: auto_store
    plugin: memory_plugin
    type: knowledge_remember
    timeout: 15
    skip_if: "steps.evaluate.output.action != 'store'"
    inputs:
      title: "${steps.evaluate.output.insight_title}"
      summary: "${steps.evaluate.output.insight_summary}"
      tags: "${steps.evaluate.output.insight_tags}"
    next: report

  # ── Step 7: 最终报告 ──
  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    inputs:
      mode: "no_retrieval"
      message: >-
        根据评估生成最终报告。

        评估结果：${steps.evaluate.output}

        报告结构：
        1. 标题和来源
        2. 内容质量和类型
        3. 项目相关度评估
        4. 全网验证情况
        5. 与已有知识的关系
        6. 处理动作（discard/report/store）
        7. 理由说明

        action=store 时：
          说明洞察已自动入库
          附上入库的条目标题和摘要
          不再询问确认

        action=discard 时：
          说明已标记为低质量
          记录过滤原因供日后参考

        action=report 时：
          说明已评估但未入库的原因
          可供日后重新评估

        纯文本输出。
