# 通用内容审核 — 支持公众号/网页/小红书/抖音等任意来源
#
# 流程：
#   1. fetch:        web_render 获取内容（统一入口）
#   2. classify:     LLM 分类内容类型 + 来源类型
#   3. web_verify:   全网搜索交叉验证
#   4. kb_check:     知识库检索
#   5. evaluate:     根据类型走不同评估标准
#   6. report:       统一入库评估报告
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"content_review","input":"<URL>"}}
#
# 设计原则：
#   - 单一入口，所有内容类型都走同一个工作流
#   - LLM 负责分类（输入是非结构化内容）
#   - evaluate 同一块 prompt 内处理不同类型
#   - 新增内容类型只需加 evaluate 标准，不改代码

id: content_review

steps:
  # ── Step 1: 统一获取内容（web_render 兼容所有页面） ──
  - id: fetch
    plugin: search_plugin
    type: web_render
    timeout: 60
    inputs:
      url: "${input}"
      wait: 5
    next: classify

  # ── Step 2: LLM 分类 ──
  - id: classify
    plugin: think_plugin
    type: chat
    timeout: 120
    retry: 1
    inputs:
      message: >-
        分析以下内容，输出 JSON。

        {
          "title": "标题",
          "source": "来源域名",
          "source_category": "knowledge|news|promotion|opinion|tutorial|video|other",
          "content_type": "类型名称",
          "core_idea": "核心内容",
          "summary": "摘要",
          "has_author": true,
          "author_name": "作者或空串",
          "publish_date": "日期或空串",
          "has_data": true,
          "has_sources": true,
          "has_specifics": true,
          "tags": ["标签"],
          "search_queries": ["搜索词1", "搜索词2"]
        }

        source_category 说明：
        - knowledge: 有持久价值的知识/教程/分析
        - news: 高时效信息
        - promotion: 推广/软文
        - opinion: 个人观点
        - video: 视频转录

        内容：
        ${steps.fetch.output}
    next: web_verify

  # ── Step 3: 全网搜索交叉验证 ──
  - id: web_verify
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "${steps.classify.output}"
    next: kb_check

  # ── Step 4: 知识库检索 ──
  - id: kb_check
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    inputs:
      keyword: "${steps.classify.output}"
    next: evaluate

  # ── Step 5: 根据类型评估（单 prompt 覆盖所有类型） ──
  - id: evaluate
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    inputs:
      message: >-
        你是内容评估助手。根据内容类型应用不同标准，输出 JSON。

        {
          "title": "标题",
          "summary": "摘要",
          "tags": ["标签"],
          "web_check": "全网验证结果",
          "kb_check": "知识库相关信息",
          "credibility": {
            "score": 0,
            "conclusion": "可信度结论",
            "details": "各维度评估"
          },
          "timeliness": "high|medium|low",
          "lasting_value": "high|medium|low",
          "recommend": "recommend|suggest|skip",
          "reason": "建议理由"
        }

        评估标准（根据 source_category 选用）：

        类型 knowledge（教程/分析/知识）：
          关注数据可靠性、独到见解、可操作性

        类型 news（新闻/快讯）：
          关注时效性、是否与已有知识重复

        类型 promotion（推广/软文）：
          关注是否有客观数据、过度营销否、标注广告否

        类型 opinion（个人观点）：
          关注论证逻辑、是否有事实支撑、反面思考

        类型 video（视频转录）：
          关注转录质量、可提取的知识点

        === 证据 ===
        标题：${steps.classify.output.title}
        来源分类：${steps.classify.output.source_category}
        核心内容：${steps.classify.output.core_idea}
        作者：${steps.classify.output.author_name}
        发布日期：${steps.classify.output.publish_date}
        客观数据：${steps.classify.output.has_data}
        引用来源：${steps.classify.output.has_sources}
        具体细节：${steps.classify.output.has_specifics}
        全网验证：${steps.web_verify.output}
        已有知识：${steps.kb_check.output}
    next: report

  # ── Step 6: 统一报告 ──
  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    inputs:
      message: >-
        生成入库评估报告。

        标题：${steps.evaluate.output.title}
        摘要：${steps.evaluate.output.summary}
        来源分类：${steps.classify.output.source_category}
        可信度评分：${steps.evaluate.output.credibility.score}
        可信度结论：${steps.evaluate.output.credibility.conclusion}
        时效性：${steps.evaluate.output.timeliness}
        持久价值：${steps.evaluate.output.lasting_value}
        建议：${steps.evaluate.output.recommend}
        理由：${steps.evaluate.output.reason}

        报告结构：
        1. 标题和来源
        2. 核心内容
        3. 内容类型
        4. 可信度评估
        5. 全网验证情况
        6. 与已有知识的关系
        7. 时效性和持久价值
        8. 入库建议

        纯文本输出，末尾询问用户是否入库。
