# 通用内容审核 v2.5 — 挖金子：评估→过滤→入库洞察
#
# 设计原则：
#   - 分层评估：先分类 → 再验证 → 最后打分，每步收窄范围
#   - 双评分过滤：quality + relevance 双 3 分门槛，防止低质内容入库污染
#   - 证据标注：每条评估结论标注可信度
#   - 容错降级：cross_check/kb_check 失败不阻塞评估，靠已有数据走 evaluate
#   - 自动化闭环：store 动作自动入库 + insight_followup，无需人工确认
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1
#   - 风险分类       → docs/ABSORPTION_GOVERNANCE.md §3
#
# 触发方式：
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"content_review","input":"<URL>"}}

id: content_review
output_target: chat

steps:
  # ── Step 1: 获取内容 ──
  - id: fetch
    plugin: search_plugin
    type: web_render
    timeout: 120
    retry: 1
    retry_delay: 5
    on_error: report_direct
    inputs:
      url: "${input}"
      wait: 5
    next: classify

  # ── Step 2: 内容分类 + 证据初判 ──
  - id: classify
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 120
    retry: 1
    retry_delay: 5
    on_error: report_direct
    inputs:
      mode: "no_retrieval"
      message: >-
        分析内容输出 JSON。对关键判断标注证据等级：
        E1 = 原文明确陈述
        E2 = 可从内容推断
        E3 = 推测

        {
          "title": "...",
          "source": "...",
          "source_category": "knowledge|news|promotion|opinion|tutorial|video",
          "content_type": "...",
          "core_idea": "...",
          "summary": "...",
          "tags": [],
          "search_queries": [],
          "source_credibility": "official/权威/普通/未验证"
        }

        内容：${steps.fetch.output}
    next: cross_check

  # ── Step 3: 全网交叉验证 ──
  - id: cross_check
    plugin: search_plugin
    type: web_search
    timeout: 60
    retry: 1
    retry_delay: 3
    on_error: evaluate
    inputs:
      query: "${steps.classify.output.search_queries[0]}"
    next: kb_check

  # ── Step 4: 知识库检索 ──
  - id: kb_check
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    on_error: evaluate
    inputs:
      keyword: "${steps.classify.output.core_idea}"
    next: evaluate

  # ── Step 5: 核心评估 + 洞察提炼（含风险登记）──
  - id: evaluate
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 2
    retry_delay: 5
    on_error: report
    inputs:
      mode: "no_retrieval"
      message: >-
        你是评估+提炼助手。评估内容质量和项目相关度，双评分 0-5。
        对每条评估结论标注 evidence 等级。

        quality_score（内容质量 0-5）：
        relevance_score（项目相关度 0-5）：

        action 取值：
          discard: quality<3 → 出报告标记已过滤，不入库
          report:  quality>=3但relevance<3 → 出报告已评估未入库
          store:   quality>=3且relevance>=3 → 提炼洞察入库

        输出 JSON：
        {
          "quality_score": 0,
          "quality_reason": "",
          "quality_evidence": "E1/E2/E3",
          "relevance_score": 0,
          "relevance_reason": "",
          "relevance_evidence": "E1/E2/E3",
          "action": "discard|report|store",
          "action_reason": "",
          "insight_title": "store时必填",
          "insight_summary": "store时必填",
          "insight_tags": [],
          "insight_evidence": "E1/E2/E3",
          "report": {
            "title": "",
            "type": "",
            "core_idea": "",
            "quality": "",
            "relevance": "",
            "web_verify": "",
            "kb_check": "",
            "verdict": ""
          }
        }

        标题：${steps.classify.output.title}
        来源：${steps.classify.output.source}
        类型：${steps.classify.output.source_category} / ${steps.classify.output.content_type}
        核心观点：${steps.classify.output.core_idea}
        摘要：${steps.classify.output.summary}
        标签：${steps.classify.output.tags}

        全网验证：${steps.cross_check.output}
        已有知识：${steps.kb_check.output}
    next: auto_store

  # ── Step 6: 自动入库 ──
  - id: auto_store
    plugin: memory_plugin
    type: knowledge_remember
    timeout: 15
    skip_if: "steps.evaluate.output.action != 'store'"
    on_error: report
    inputs:
      title: "${steps.evaluate.output.insight_title}"
      summary: "${steps.evaluate.output.insight_summary}"
      tags: "${steps.evaluate.output.insight_tags}"
    next: report

  # ── Step 7: 最终报告 ──
  - id: report
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 60
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        根据评估生成最终报告。

        评估结果：${steps.evaluate.output}

        报告结构：
        1. 标题和来源（含来源可信度）
        2. 内容质量和类型（含 evidence 等级）
        3. 项目相关度评估（含 evidence 等级）
        4. 全网验证情况
        5. 与已有知识的关系
        6. 处理动作（discard/report/store）
        7. 理由说明

        action=store 时：说明洞察已自动入库，附 evidence 等级。
        action=discard 时：说明已标记为低质量，记录过滤原因。
        action=report 时：说明已评估但未入库的原因。

        纯文本输出。
    next: done

  # ── 降级：获取页面失败时 ──
  - id: report_direct
    plugin: think_plugin
    type: chat
    timeout: 30
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        页面获取失败，URL: ${input}，生成一条简要记录告知用户。
        输出纯文本，50 字以内，说明该 URL 当前不可达。
