# 写作助手 v2.5 — 搜索相关记忆，辅助写作全流程
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: writing_assistant
output_target: chat

steps:
  - id: search_memory
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    on_error: done
    inputs:
      keyword: "${input}"
    next: build_outline

  - id: build_outline
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下相关知识，为"${input}"生成写作大纲。

        要求：结构清晰，3-5 个主要章节，每个章节标注可引用的知识条目 ID。

        相关知识：
        ${steps.search_memory.output}
    next: draft

  - id: draft
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        根据以下大纲和参考资料，用流畅的中文写出完整的文章初稿。

        主题：${input}
        大纲：${steps.build_outline.output}
        参考资料：${steps.search_memory.output}

        约 800-1500 字，参考资料融入文章，不要生硬引用。
    next: critique

  - id: critique
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        审查以下文章草稿，输出 JSON：

        {
          "score": 0-10,
          "issues": ["问题1", "问题2"],
          "suggestions": ["修改建议1", "修改建议2"]
        }

        草稿：
        ${steps.draft.output}
    next: revise

  - id: revise
    plugin: think_plugin
    type: chat
    timeout: 180
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        根据审查意见修订以下文章。

        原稿：${steps.draft.output}
        审查意见：${steps.critique.output}
    next: save

  - id: save
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "note"
      title: "${input}"
      summary: "写作助手生成"
      tags: '["writing"]'
      content: "${steps.revise.output}"
