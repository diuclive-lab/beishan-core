# 写作助手 — 搜索相关记忆，辅助写作全流程
#
# 流程：
#   1. search_memory:   搜索知识库获取相关材料
#   2. build_outline:   生成大纲（标注可引用的知识条目 ID）
#   3. draft:           根据大纲和材料写初稿
#   4. critique:        自我批评（输出 score/issues/suggestions）
#   5. revise:          根据批评意见修订
#   6. save:            成品入库（source_type=note）
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"writing_assistant","input":"写一篇关于XX的文章"}}

id: writing_assistant

steps:
  - id: search_memory
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    inputs:
      keyword: "${input}"
    next: build_outline

  - id: build_outline
    plugin: think_plugin
    type: chat
    timeout: 120
    inputs:
      message: >-
        基于以下相关知识，为"${input}"生成写作大纲。

        要求：
        - 结构清晰，3-5 个主要章节
        - 每个章节标注可引用的知识条目 ID

        相关知识：
        ${steps.search_memory.output}

        关联推荐：
        ${steps.suggest_links.output}
    next: draft

  - id: draft
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    inputs:
      message: >-
        你是一个写作助手。根据以下大纲和参考资料，用流畅的中文写出完整的文章初稿。

        主题：${input}

        大纲：
        ${steps.build_outline.output}

        参考资料：
        ${steps.search_memory.output}

        输出要求：
        - 约 800-1500 字
        - 参考资料中的有用信息融入文章，不要生硬引用
        - 风格统一、逻辑通顺
    next: critique

  - id: critique
    plugin: think_plugin
    type: chat
    timeout: 120
    inputs:
      message: >-
        你是一个资深编辑。审查以下文章草稿，输出严格的 JSON（不加任何其他文字）：

        {
          "score": 0-10,
          "issues": ["问题1", "问题2"],
          "suggestions": ["修改建议1", "修改建议2"]
        }

        草稿：
        ${steps.draft.output}
    next: revise

  - id: revise
    plugin: think_plugin
    type: chat
    timeout: 180
    inputs:
      message: >-
        你是一个写作助手。根据审查意见修订以下文章。

        原稿：
        ${steps.draft.output}

        审查意见：
        ${steps.critique.output}
    next: save

  - id: save
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    inputs:
      source_type: "note"
      title: "${input}"
      summary: "写作助手生成"
      tags: '["writing"]'
      content: "${steps.revise.output}"
