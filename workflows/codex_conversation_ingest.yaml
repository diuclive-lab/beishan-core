# Codex 对话入库 v2.5 — 从 Codex 对话中提炼结构化知识
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: codex_conversation_ingest
output_target: chat

steps:
  - id: extract
    plugin: codex_plugin
    type: codex_session_extract
    timeout: 15
    on_error: done
    inputs:
      id: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个知识提炼助手。分析以下 Codex 对话，提炼可沉淀的知识。
        对关键结论标注 evidence=E1(对话中有明确陈述)/E2(可推断)/E3(推测)。

        原则：只入库结论、决策、模式、任务。不入库寒暄、过程噪音。

        对话内容：
        ${steps.extract.output}

        输出 JSON：
        {
          "source_type": "codex",
          "title": "简洁标题",
          "summary": "一句话摘要",
          "tags": ["标签1", "标签2"],
          "topics": ["所属主题"],
          "tasks": ["提取的行动项"],
          "content": "整理后的完整内容，保留决策理由和架构选择"
        }
    next: save_knowledge

  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "${steps.analyze.output.source_type}"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      content: "${steps.analyze.output.content}"
    next: suggest_links

  - id: suggest_links
    plugin: memory_plugin
    type: knowledge_suggest_links
    timeout: 10
    on_error: done
    inputs:
      id: "${steps.save_knowledge.output.id}"
      max_results: 5
