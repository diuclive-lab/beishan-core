# 旧项目审计 v2.5 — 扫描旧项目结构，识别有价值模块
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: legacy_code_audit
output_target: chat

steps:
  - id: read_structure
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 30
    on_error: done
    inputs:
      command: find ${input} -name '*.py' -o -name '*.go' \) | grep -v __pycache__ | grep -v .pyc  | head -100"
    next: audit

  - id: audit
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 2
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        审计以下旧项目文件列表，对每条判断标注 evidence=E1(可以直接看到)/E2(从文件名推断)/E3(猜测)。

        输出 JSON：
        {
          "modules": [
            {
              "name": "模块名",
              "path": "路径",
              "description": "描述",
              "worth_reading": true,
              "evidence": "E1/E2/E3",
              "skip_reason": "不值得读的原因"
            }
          ],
          "architecture": "整体架构总结",
          "best_candidates": ["最值得移植的3个模块路径"]
        }

        file_list:
        ${steps.read_structure.output}
    next: save

  - id: save
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "code"
      title: "旧项目审计报告"
      summary: "${steps.audit.output.architecture}"
      tags: '["legacy", "audit", "architecture"]'
      topics: '["code-review", "migration"]'
      tasks: "${steps.audit.output.best_candidates}"
      content: "${steps.audit.output}"
