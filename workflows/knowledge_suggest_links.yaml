# 知识关联建议 v2.5 — 为指定条目推荐可关联的条目
#
# 注意：仅输出建议，不自动写入 links 字段
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: knowledge_suggest_links

steps:
  - id: suggest
    plugin: memory_plugin
    type: knowledge_suggest_links
    timeout: 15
    on_error: done
    inputs:
      id: "${input}"
      max_results: 15
    next: report

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下关联建议结果，生成可读的中文报告。

        说明：
        - score >= 0.5 的强关联条目
        - score >= 0.3 的弱关联条目
        - 如果候选数为 0，说明"暂无相关条目"
        - 建议用户通过 "帮我关联 kn_A 到 kn_B" 确认写入

        关联建议结果：
        ${steps.suggest.output}
