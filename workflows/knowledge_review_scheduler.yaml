# 知识审查工作流 — 扫描最近对话，提取值得记住的知识候选
#
# 流程：
#   1. scan:     扫描最近对话记录，提取包含触发关键词的对话
#   2. analyze:  分析候选对话，提取知识标题和摘要，直接输出 JSON 格式
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"knowledge_review_scheduler"}}
#
# 设计原则：
#   - deterministic review：基于关键词触发，不依赖 LLM 判断
#   - LLM 只做一次语义提取（analyze），输出结构化 JSON
#   - Code 负责渲染（deterministic renderer）
#   - Schema contract + validation gate
#   - 只生成报告，不自动写入
#   - 人工确认后才入库

id: knowledge_review_scheduler

steps:
  - id: scan
    plugin: session_search_plugin
    type: session_search
    timeout: 30
    inputs:
      keyword: "已放弃 最终方案 确认结论 架构决定 经验教训 踩坑记录 最终决定"
      limit: 50
    next:
      - goto: analyze

  - id: analyze
    plugin: think_plugin
    type: chat  # kernel routing 语义（L1）
    timeout: 120
    inputs:
      message: |
        分析以下对话记录，找出值得记住的知识。

        触发条件（必须包含以下关键词之一）：
        - 已放弃
        - 最终方案
        - 确认结论
        - 架构决定
        - 经验教训
        - 踩坑记录
        - 最终决定

        对话记录：
        ${steps.scan.output}

        输出格式（严格JSON，不要任何其他文本）：
        {
          "candidates": [
            {
              "title": "知识标题",
              "summary": "知识摘要（50字以内）",
              "score": 0.91,
              "reason": "为什么值得记住"
            }
          ]
        }

        如果没有值得记住的知识，输出：
        {"candidates": []}
      mode: review_extract  # L4 语义
