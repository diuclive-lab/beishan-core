# 反向生成文档 v2.5 — 从知识库分析结果生成标准技术文档
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: legacy_doc_generate
output_target: chat

steps:
  - id: search_analysis
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    on_error: done
    inputs:
      keyword: "${input}"
    next: generate

  - id: generate
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下知识库分析结果，生成标准格式的技术文档。

        文档模板：
        # ${input}
        ## 功能描述
        ## 核心逻辑
        ## 有价值的设计模式
        ## 对 beishan-core 的参考价值
        ## 待改进点
        ## 行动项

        知识库分析结果：
        ${steps.search_analysis.output}

        请输出完整的 Markdown 文档。
    next: save_file

  - id: save_file
    plugin: write_plugin
    type: write_file
    timeout: 15
    on_error: done
    inputs:
      path: "docs/legacy/${input}.md"
      content: "${steps.generate.output}"
    next: save_knowledge

  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "note"
      title: "${input} 文档"
      summary: "反向生成的技术文档"
      tags: '["legacy", "documentation"]'
      topics: '["migration", "reference"]'
      content: "${steps.generate.output}"
