# 安全审计双通道 v2.5 — 规则 + AI 并行审查
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1
#   - 风险分类       → docs/ABSORPTION_GOVERNANCE.md §3

id: security_audit_parallel

steps:
  - id: get_diff
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 15
    on_error: done
    inputs:
      command: >-
        if [ -f "${input}" ]; then cat "${input}"; else echo "file not found"; fi
    next: parallel_audit

  - id: parallel_audit
    type: parallel
    timeout: 60
    steps:
      - id: rule_check
        plugin: memory_plugin
        type: code_security_check
        inputs:
          diff: "${steps.get_diff.output}"
      - id: ai_review
        plugin: memory_plugin
        type: code_ai_review
        on_error: skip
        inputs:
          code: "${steps.get_diff.output}"
    next: cross_check

  - id: cross_check
    plugin: think_plugin
    type: chat
    timeout: 30
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        对比以下两份审查结果，输出最终安全评分和修复建议（含 evidence 等级和风险分类）：

        规则审查：${steps.parallel_audit.rule_check.output}
        AI 审查：${steps.parallel_audit.ai_review.output}
    next: save_result

  - id: save_result
    plugin: memory_plugin
    type: knowledge_add
    timeout: 10
    on_error: done
    inputs:
      title: "安全审计报告: ${input}"
      summary: "${steps.cross_check.output}"
      source_type: "security"
