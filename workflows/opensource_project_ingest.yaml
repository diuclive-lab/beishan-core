# 开源项目入库 v2.5 — 分层采样、提取可借鉴的设计模式
#
# 流程：
#   1. fetch_readme:     获取项目 README
#   2. fetch_tree:       搜索目录结构
#   3. identify_keywords: DeepSeek 定位核心文件和技术关键词
#   4. research_parallel: 三步并发（core_files + design_docs + issues）
#   5. analyze:          DeepSeek 综合分析 → 结构化输出（含证据标注）
#   6. save_knowledge:   知识条目入库
#   7. save_todos:       提取的行动项落地
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1
#   - 风险分类       → docs/ABSORPTION_GOVERNANCE.md §3
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"opensource_project_ingest","input":"https://github.com/user/repo"}}

id: opensource_project_ingest

steps:
  # ── 串行：获取项目基本信息 ──
  - id: fetch_readme
    plugin: search_plugin
    type: web_fetch
    timeout: 30
    on_error: done
    inputs:
      url: "${input}"
    next: fetch_tree

  - id: fetch_tree
    plugin: search_plugin
    type: web_search
    timeout: 30
    on_error: done
    inputs:
      query: "${input} site:github.com directory structure"
    next: identify_keywords

  - id: identify_keywords
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下项目的 README 和目录结构，输出严格的 JSON（不加任何其他文字）：

        {
          "core_files": ["最值得阅读的3个文件路径"],
          "search_keywords": ["用于定向挖掘的5个技术关键词"],
          "design_questions": ["3个最值得搜索的设计决策问题"],
          "source_confidence": "E1(来自README明确描述)/E2(从目录推断)/E3(推测)"
        }

        README 内容：
        ${steps.fetch_readme.output}

        目录结构：
        ${steps.fetch_tree.output}
    next: research_parallel

  # ── 并行：三步并发 ──
  - id: research_parallel
    type: parallel
    timeout: 90
    steps:
      - id: fetch_core_files
        plugin: search_plugin
        type: web_fetch
        timeout: 60
        retry: 2
        retry_delay: 2
        on_error: skip
        inputs:
          url: "${input}/blob/main/${steps.identify_keywords.output.core_files[0]}"

      - id: fetch_design_docs
        plugin: search_plugin
        type: web_search
        timeout: 30
        on_error: skip
        inputs:
          query: "${steps.identify_keywords.output.search_keywords[0]} ${input} architecture design"

      - id: fetch_issues
        plugin: search_plugin
        type: web_search
        timeout: 30
        on_error: skip
        inputs:
          query: "site:github.com ${input} issues design why chose"
    next: analyze

  # ── 串行：综合分析 ──
  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 2
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个架构分析师。综合以下所有信息，输出严格的 JSON。
        每条分析结论必须标注 evidence 等级：
        E1 = 源码/文档直接可见
        E2 = 从目录结构推断
        E3 = 从 issue 讨论推断
        E4 = 推测（标注 hypothesis）

        {
          "title": "项目一句话定位",
          "summary": "核心架构思想（100字内）",
          "tags": ["技术标签"],
          "topics": ["领域标签"],
          "patterns": "可借鉴的设计模式说明",
          "patterns_evidence": "E1/E2/E3/E4",
          "gaps": "与 beishan-core 的差距",
          "gaps_evidence": "E1/E2/E3/E4",
          "tasks": [
            {
              "task": "具体可执行的行动项",
              "priority": "high/medium/low",
              "source": "从哪部分分析得出"
            }
          ]
        }

        README：
        ${steps.fetch_readme.output}

        目录结构：
        ${steps.fetch_tree.output}

        核心源码：
        ${steps.research_parallel.output.fetch_core_files}

        架构文档：
        ${steps.research_parallel.output.fetch_design_docs}

        Issue 讨论：
        ${steps.research_parallel.output.fetch_issues}
    next: save_knowledge

  # ── 串行：落地 ──
  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "opensource"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      raw_ref: "${input}"
      content: "${steps.analyze.output.patterns}"
    next: save_todos

  - id: save_todos
    plugin: todo_plugin
    type: todo_add
    timeout: 10
    on_error: done
    inputs:
      todos: "${steps.analyze.output.tasks}"
      source: "${steps.save_knowledge.output.id}"
