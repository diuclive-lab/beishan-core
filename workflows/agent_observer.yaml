# L1 主动观察者 Agent
# 定期轮询技术资讯源 → 按知识库主题筛选 → 高相关内容自动入库 → 通知用户
#
# 触发方式（手动）：
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"agent_observer"}}
#
# 定时执行（由 scheduler_plugin 管理，main.go 注册 cron: "0 8 * * 1-5"）

id: agent_observer

steps:
  # ── Step 1: 抓取默认资讯源 ──
  - id: fetch
    plugin: memory_plugin
    type: rss_default
    timeout: 60
    retry: 1
    next: score

  # ── Step 2: LLM 评估相关性并筛选 ──
  - id: score
    plugin: think_plugin
    type: chat
    timeout: 120
    inputs:
      mode: "no_retrieval"
      message: >-
        你的任务是从以下资讯中筛选出与 beishan-core 项目相关的条目。

        beishan-core 关注领域：
        - 编程语言（Go/Python/Rust/TypeScript）、微内核架构、智能体编排
        - 知识管理、语义检索、知识图谱
        - 量化交易、股票分析、金融数据
        - 图片生成、视觉 AI、提示词工程
        - 开源项目工程实践、架构设计、DevOps

        资讯列表：
        ${steps.fetch.output}

        对每条资讯：
        1. 判断是否与关注领域相关
        2. 如果相关，用中文总结核心价值（20字以内）
        3. 输出 JSON 数组：[{"title":"...","url":"...","reason":"..."}]，不相关的不要包含

        如果都不相关，输出空数组 []。
    next: auto_ingest

  # ── Step 3: 生成入库内容 ──
  - id: auto_ingest
    plugin: think_plugin
    type: chat
    timeout: 60
    skip_if: "len(steps.score.output) == 0 || steps.score.output == '[]'"
    inputs:
      mode: "no_retrieval"
      message: >-
        为以下条目生成知识入库内容，输出 JSON 数组：

        ${steps.score.output}

        每条格式：
        {"title":"项目名称","summary":"核心价值及参考意义","tags":["参考项目","Go"],"source_type":"code","content":"URL和推荐理由"}

        source_type 固定用 "code"。tags 至少包含 "参考项目" 和技术栈标签。
        直接输出 JSON 数组，不要其他文字。
    next: store

  # ── Step 4: 批量入库 ──
  - id: store
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    skip_if: "steps.auto_ingest.output == '[]'"
    batch:
      foreach: "${steps.auto_ingest.output}"
      parallel: true
      concurrency: 3
    inputs:
      source_type: "${item.source_type}"
      title: "${item.title}"
      summary: "${item.summary}"
      tags: "${item.tags}"
      content: "${item.content}"
    next: report

  # ── Step 5: 汇总通知（含日期） ──
  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    inputs:
      mode: "no_retrieval"
      message: >-
        生成今日观察报告。

        筛选结果：${steps.auto_ingest.output}

        如果有入库条目：
          用中文列出每条标题、来源和推荐理由。
          在末尾加上今天的日期。

        如果无条目或筛选结果为空数组：
          输出"今日未发现与项目相关的新内容。"
