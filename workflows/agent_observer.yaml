# L1 主动观察者 Agent v2.5 — 定期轮询技术资讯 → 筛选 → 入库
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: agent_observer

steps:
  - id: fetch
    plugin: memory_plugin
    type: rss_default
    timeout: 60
    retry: 1
    on_error: done
    next: score

  - id: score
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        从以下资讯中筛选出与 beishan-core 项目相关的条目。

        beishan-core 关注领域：
        - Go/Python/Rust/TypeScript、微内核、智能体编排
        - 知识管理、语义检索、知识图谱
        - 量化交易、股票分析、金融数据
        - 图片生成、视觉 AI、提示词工程
        - 开源项目工程实践、架构设计

        资讯列表：
        ${steps.fetch.output}

        对每条相关资讯，输出 JSON 数组：
        [{"title":"...","url":"...","reason":"...","evidence":"E1/E2"}]

        如果都不相关，输出 []。
    next: extract_urls

  - id: extract_urls
    plugin: think_plugin
    type: chat
    timeout: 60
    skip_if: "steps.score.output == '[]'"
    on_error: report
    inputs:
      mode: "no_retrieval"
      message: >-
        从以下筛选结果中提取 URL 列表，输出 JSON 字符串数组：

        ${steps.score.output}

        格式：["url1","url2","url3"]
    next: analyze

  - id: analyze
    plugin: workflow_plugin
    type: workflow_run
    timeout: 300
    skip_if: "steps.extract_urls.output == '[]'"
    on_error: report
    batch:
      foreach: "${steps.extract_urls.output}"
      parallel: true
      concurrency: 2
    inputs:
      workflow: "project_analyze"
      input: "${item}"
    next: report

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        生成今日观察报告。

        发现项目：${steps.score.output}
        分析完成：${steps.analyze.count} 个

        如果分析完成 > 0：列出每个项目的名称、技术栈和可借鉴点。
        如果无项目：输出"今日未发现与项目相关的新内容。"
