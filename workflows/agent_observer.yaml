# L1 主动观察者 Agent
# 定期轮询技术资讯源 → 按知识库主题筛选 → 高相关内容自动入库 → 通知用户
#
# 触发方式（手动）：
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"agent_observer"}}
#
# 定时执行（由 scheduler_plugin 管理，main.go 注册 cron: "0 8 * * 1-5"）

id: agent_observer

steps:
  # ── Step 1: 抓取默认资讯源 ──
  - id: fetch
    plugin: memory_plugin
    type: rss_default
    timeout: 60
    retry: 1
    next: score

  # ── Step 2: LLM 评估相关性并筛选 ──
  - id: score
    plugin: think_plugin
    type: chat
    timeout: 120
    inputs:
      mode: "no_retrieval"
      message: >-
        你的任务是从以下资讯中筛选出与 beishan-core 项目相关的条目。

        beishan-core 关注领域：
        - 编程语言（Go/Python/Rust/TypeScript）、微内核架构、智能体编排
        - 知识管理、语义检索、知识图谱
        - 量化交易、股票分析、金融数据
        - 图片生成、视觉 AI、提示词工程
        - 开源项目工程实践、架构设计、DevOps

        资讯列表：
        ${steps.fetch.output}

        对每条资讯：
        1. 判断是否与关注领域相关
        2. 如果相关，用中文总结核心价值（20字以内）
        3. 输出 JSON 数组：[{"title":"...","url":"...","reason":"..."}]，不相关的不要包含

        如果都不相关，输出空数组 []。
    next: auto_ingest

  # ── Step 3: 提取项目 URL ──
  - id: extract_urls
    plugin: think_plugin
    type: chat
    timeout: 60
    skip_if: "len(steps.score.output) == 0 || steps.score.output == '[]'"
    inputs:
      mode: "no_retrieval"
      message: >-
        从以下筛选结果中提取 URL 列表，输出 JSON 字符串数组：

        ${steps.score.output}

        格式：["url1","url2","url3"]

        只输出 JSON 数组，不要其他文字。
    next: analyze

  # ── Step 4: 逐个项目深度分析 ──
  - id: analyze
    plugin: workflow_plugin
    type: workflow_run
    timeout: 300
    skip_if: "steps.extract_urls.output == '[]'"
    batch:
      foreach: "${steps.extract_urls.output}"
      parallel: true
      concurrency: 2
    inputs:
      workflow: "project_analyze"
      input: "${item}"
    next: report

  # ── Step 5: 汇总通知（含日期） ──
  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    inputs:
      mode: "no_retrieval"
      message: >-
        生成今日观察报告。

        发现项目：${steps.score.output}
        分析完成：${steps.analyze.count} 个

        如果分析完成 > 0：
          用中文列出每个项目的名称、技术栈和可借鉴点。
          在末尾加上今天的日期。

        如果无项目：
          输出"今日未发现与项目相关的新内容。"
