# 代码项目分析 v2.5 — 分析入口文件，提取架构知识
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: code_project_analyze
output_target: chat

steps:
  - id: read_file
    plugin: write_plugin
    type: file_parse
    timeout: 15
    retry: 1
    on_error: done
    inputs:
      path: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 2
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个代码架构分析师。分析以下源码文件，输出严格 JSON。

        对每条设计判断标注 evidence=E1(源码中直接体现)/E2(推断)/E3(推测)。

        {
          "title": "文件的架构角色（10字内）",
          "summary": "核心逻辑和设计思想（60字内）",
          "tags": ["语言", "框架", "设计模式"],
          "topics": ["领域标签"],
          "patterns": "可借鉴的设计模式（一句话）",
          "evidence": "E1/E2/E3"
        }

        文件路径：${input}
        源码内容：
        ${steps.read_file.output.content}
    next: save

  - id: save
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "code"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      raw_ref: "${input}"
      content: "${steps.analyze.output.patterns}"
