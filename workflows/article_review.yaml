# 公众号文章交叉验证 — 用 headless 浏览器渲染 → 分析 → 全网交叉验证 → 评估
#
# 流程：
#   1. fetch_article:  web_render（headless Chromium 渲染 JS 页面）
#   2. analyze:        LLM 提取结构化摘要
#   3. web_verify:     全网搜索佐证
#   4. search_knowledge: 知识库检索
#   5. evaluate:       综合评估 + 入库建议
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"article_review","input":"<公众号文章URL>"}}

id: article_review

steps:
  # ── Step 1: headless 浏览器渲染提取正文 ──
  - id: fetch_article
    plugin: search_plugin
    type: web_render
    timeout: 60
    inputs:
      url: "${input}"
      wait: 8
    next: analyze

  # ── Step 2: LLM 提取结构化信息 ──
  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 120
    retry: 1
    inputs:
      message: >-
        分析以下文章，提取信息并输出 JSON。

        {
          "title": "文章标题",
          "core_idea": "核心观点",
          "summary": "内容摘要",
          "argument_type": "fact|opinion|analysis|tutorial|news",
          "tags": ["标签1", "标签2"]
        }

        文章内容：
        ${steps.fetch_article.output}
    next: web_verify

  # ── Step 3: 全网搜索交叉验证 ──
  - id: web_verify
    plugin: search_plugin
    type: web_search
    timeout: 30
    inputs:
      query: "${steps.analyze.output}"
    next: search_knowledge

  # ── Step 4: 知识库检索 ──
  - id: search_knowledge
    plugin: memory_plugin
    type: knowledge_search
    timeout: 15
    inputs:
      keyword: "${steps.analyze.output}"
    next: evaluate

  # ── Step 5: 综合评估 ──
  - id: evaluate
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    inputs:
      message: >-
        你是知识评估助手。请综合以下三份证据，判断这篇文章的可信度和入库价值。

        输出 JSON 格式：
        {
          "title": "文章标题",
          "core_idea": "核心观点",
          "summary": "摘要",
          "tags": ["标签"],
          "web_check": "全网对这个话题的佐证情况",
          "kb_check": "知识库中相关信息",
          "credibility": {
            "has_author": true/false,
            "has_sources": true/false,
            "has_data": true/false,
            "has_specifics": true/false,
            "score": 0,
            "conclusion": "可信度结论"
          },
          "recommend": "recommend|suggest|skip",
          "reason": "建议理由"
        }

        客观评分标准（逐项检查，true 每项 +1 分）：
        - has_author: 有明确作者
        - has_sources: 引用了外部来源
        - has_data: 有具体数据/日期
        - has_specifics: 有具体细节或踩坑记录

        证据 1 — 文章原文：
        ${steps.fetch_article.output}

        证据 2 — 全网搜索结果：
        ${steps.web_verify.output}

        证据 3 — 知识库：
        ${steps.search_knowledge.output}
