# 月报复盘 — 聚合月度知识条目和待办，生成复盘报告和趋势分析
#
# 流程：
#   1. list_knowledge:  获取本月知识条目（最近 30 天）
#   2. list_todos:      获取当前待办列表
#   3. analyze:         DeepSeek 趋势分析 → 输出月报
#   4. send_report:     邮件推送（可选）
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"monthly_review","input":"30"}}
#    input 设为天数（30=月度，90=季度）
#
# 通知配置: 设环境变量 NOTIFY_TARGET

id: monthly_review

steps:
  - id: list_knowledge
    plugin: memory_plugin
    type: knowledge_list
    timeout: 15
    inputs:
      days: "${input}"
    next: list_todos

  - id: list_todos
    plugin: todo_plugin
    type: todo_list
    timeout: 10
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    retry_delay: 3
    inputs:
      message: >-
        你是一个个人知识助理，请基于以下数据生成一份月度复盘报告。

        格式要求：
        ## 月度知识概况
        - 本月新增条目数、主要类型
        - 本月高频标签和主题
        - 与上月相比的变化

        ## 项目进展
        - 按项目/主题分类，列出本月关键进展
        - 每个项目列出代表条目

        ## 待办状态
        - 当前待办总数、已完成、未完成
        - 关键未完成事项

        ## 趋势分析
        - 本月关注焦点的变化
        - 哪些方向持续投入，哪些方向减少了
        - 从条目中可以看出的模式/规律

        ## 差距与机会
        - 哪些方向记录不足
        - 建议下个月关注什么

        ## 下步建议
        - 3-5 条可执行建议（基于待办和知识缺口）

        ===== 知识条目 =====
        ${steps.list_knowledge.output}

        ===== 待办事项 =====
        ${steps.list_todos.output}
    next: send_report

  - id: send_report
    plugin: notify_plugin
    type: notify_send
    timeout: 15
    on_error: done
    inputs:
      channel: email
      subject: "beishan-core 月报"
      message: "本月知识复盘报告:\n\n${steps.analyze.output}"
