# 月报复盘 v2.5 — 聚合月度知识条目，生成趋势分析
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: monthly_review

steps:
  - id: list_knowledge
    plugin: memory_plugin
    type: knowledge_list
    timeout: 15
    on_error: done
    inputs:
      days: "${input}"
    next: list_todos

  - id: list_todos
    plugin: todo_plugin
    type: todo_list
    timeout: 10
    on_error: done
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    retry_delay: 3
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下数据生成月度复盘报告。

        ## 月度知识概况
        ## 项目进展
        ## 待办状态
        ## 趋势分析
        ## 差距与机会
        ## 下步建议

        知识条目：
        ${steps.list_knowledge.output}

        待办事项：
        ${steps.list_todos.output}
    next: send_report

  - id: send_report
    plugin: notify_plugin
    type: notify_send
    timeout: 15
    on_error: done
    inputs:
      channel: email
      subject: "beishan-core 月报"
      message: "本月知识复盘报告:

${steps.analyze.output}"
