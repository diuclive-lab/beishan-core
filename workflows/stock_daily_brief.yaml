# 股票日报 — 自动行情抓取 → AI 分析 → 推送报告
#
# 用法：
#   单个股票：
#     POST /api/chat
#     {"recipient":"workflow_plugin","type":"workflow_run",
#      "payload":{"workflow":"stock_daily_brief","input":"600519"}}
#
#   多个股票（逗号分隔）：
#     {"workflow":"stock_daily_brief","input":"600519,000001,300750"}
#
# 定时执行（通过 scheduler_plugin）：
#     {"workflow":"stock_daily_brief","input":"600519","cron":"0 9 * * 1-5"}

id: stock_daily_brief

steps:
  # ── Step 1: 拉取行情 ──
  - id: fetch
    plugin: memory_plugin
    type: stock_multi_quote
    timeout: 15
    retry: 2
    inputs:
      codes: "${input | split}"
    next: analyze

  # ── Step 2: AI 分析 ──
  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 120
    inputs:
      message: >-
        你是股票分析助手。分析以下行情数据，输出 JSON：

        {
          "summary": "一句话总结今日表现",
          "gainers": ["涨幅居前的股票"],
          "losers": ["跌幅居前的股票"],
          "signals": ["技术面信号"],
          "advice": "操作建议"
        }

        行情数据：
        ${steps.fetch.output}
    next: report

  # ── Step 3: 推送报告 ──
  - id: report
    plugin: notify_plugin
    type: notify_send
    timeout: 15
    on_error: done
    inputs:
      channel: "email"
      target: "${NOTIFY_TARGET}"
      subject: "股票日报 ${steps.fetch.output.date}"
      message: "${steps.analyze.output}"
