# 股票日报 v2.5 — 行情抓取 → AI 分析 → 推送
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: stock_daily_brief
output_target: chat

steps:
  - id: fetch
    plugin: memory_plugin
    type: stock_multi_quote
    timeout: 15
    retry: 2
    on_error: done
    inputs:
      codes: "${input | split}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是股票分析助手。分析以下行情数据，对关键信号标注 evidence=E1(数据直接显示)/E2(推断)。

        输出 JSON：
        {
          "summary": "一句话总结今日表现",
          "gainers": ["涨幅居前"],
          "losers": ["跌幅居前"],
          "signals": [{"signal": "技术面信号", "evidence": "E1/E2"}],
          "advice": "操作建议"
        }

        行情数据：
        ${steps.fetch.output}
    next: report

  - id: report
    plugin: notify_plugin
    type: notify_send
    timeout: 15
    on_error: done
    inputs:
      channel: "email"
      target: "${NOTIFY_TARGET}"
      subject: "股票日报 ${steps.fetch.output.date}"
      message: "${steps.analyze.output}"
