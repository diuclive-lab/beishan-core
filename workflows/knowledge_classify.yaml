# 知识分类 — 用本地模型为知识条目打上 knowledge_type 标签
#
# 认知类型：
#   Principle    — 稳定原则（不应轻易改变的规则）
#   ADR          — 架构决策记录（技术选型、设计取舍）
#   Lesson       — 经验总结（从实践中提炼的经验）
#   AntiPattern  — 禁止行为（明确不应该做的事）
#   Hotspot      — 代码风险点（需要关注的脆弱区域）
#   Telemetry    — 指标反馈（从数据/监控中得出的结论）
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"knowledge_classify","input":"kn_xxx"}}

id: knowledge_classify

steps:
  - id: get
    plugin: memory_plugin
    type: knowledge_get
    timeout: 10
    inputs:
      id: "${input}"
    next: classify

  - id: classify
    plugin: think_plugin
    type: chat
    provider: local
    timeout: 120
    retry: 1
    inputs:
      message: >-
        你是一个知识分类助手。请分析以下知识条目，判断其认知类型。

        认知类型定义：
        - Principle: 稳定原则，不应轻易改变的规则或信念
        - ADR: 架构决策记录，技术选型、设计取舍的决策
        - Lesson: 经验总结，从实践/失败/成功中提炼的经验
        - AntiPattern: 禁止行为，明确不应该做的事
        - Hotspot: 代码风险点，需要关注的脆弱区域或技术债
        - Telemetry: 指标反馈，从数据/监控/指标中得出的结论

        当前条目：
        ${steps.get.output}

        请严格输出以下 JSON 格式（不加任何其他文字）：

        {
          "knowledge_type": "类型名称",
          "confidence": 0.85,
          "importance": "high|medium|low",
          "reason": "分类理由（一句话）"
        }
    next: update

  - id: update
    plugin: memory_plugin
    type: knowledge_update
    timeout: 15
    inputs:
      id: "${input}"
      knowledge_type: "${steps.classify.output.knowledge_type}"
      confidence: "${steps.classify.output.confidence}"
      importance: "${steps.classify.output.importance}"
