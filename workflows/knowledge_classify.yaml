# 知识分类 v2.5 — 用本地模型为知识条目打上 knowledge_type 标签
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: knowledge_classify

steps:
  - id: get
    plugin: memory_plugin
    type: knowledge_get
    timeout: 10
    on_error: done
    inputs:
      id: "${input}"
    next: classify

  - id: classify
    plugin: think_plugin
    type: chat
    provider: deepseek
    timeout: 120
    retry: 1
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个知识分类助手。分析条目，判断其认知类型。
        对判断结果标注 evidence=E1(内容明确)/E2(推断)/E3(猜测)。

        认知类型：
        - Principle: 稳定原则
        - ADR: 架构决策记录
        - Lesson: 经验总结
        - AntiPattern: 禁止行为
        - Hotspot: 代码风险点
        - Telemetry: 指标反馈

        当前条目：
        ${steps.get.output}

        输出 JSON：
        {
          "knowledge_type": "类型名称",
          "confidence": 0.85,
          "importance": "high|medium|low",
          "reason": "分类理由",
          "evidence": "E1/E2/E3"
        }
    next: update

  - id: update
    plugin: memory_plugin
    type: knowledge_update
    timeout: 15
    on_error: done
    inputs:
      id: "${input}"
      knowledge_type: "${steps.classify.output.knowledge_type}"
      confidence: "${steps.classify.output.confidence}"
      importance: "${steps.classify.output.importance}"
