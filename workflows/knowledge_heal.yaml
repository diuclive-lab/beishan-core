# 知识自愈 v2.5 — 定期扫描重复/缺失关联 + 自动修复 + 报告
#
# 定时执行（由 scheduler_plugin 管理，cron: "0 4 * * 1" 每周一 04:00）
#
# 治理框架引用：
#   - 风险分类 → docs/ABSORPTION_GOVERNANCE.md §3
#   - 升级策略 → docs/ABSORPTION_GOVERNANCE.md §4

id: knowledge_heal
output_target: chat

steps:
  # ── Step 1: 自愈扫描 ──
  - id: scan
    plugin: memory_plugin
    type: knowledge_heal
    timeout: 60
    on_error: done
    inputs:
      threshold: 60
      auto_merge: true
    next: report

  # ── Step 2: 生成报告（含修复记录）──
  - id: report
    plugin: think_plugin
    type: chat
    timeout: 30
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        生成知识自愈报告。输出严格 JSON，不含其他文字：

        {
          "merged_count": 自动合并的条目对数,
          "manual_count": 待人工处理的条目数,
          "issues": [
            {
              "type": "duplicate/relation_missing",
              "description": "问题描述",
              "evidence": "E1/E2",
              "auto_fixed": true/false
            }
          ],
          "heal_summary": "总体情况（50字内）"
        }

        扫描结果：${steps.scan.output}

        如果 merged_count == 0 且 manual_count == 0：
        {"merged_count":0, "manual_count":0, "issues":[], "heal_summary":"知识库状态良好"}
