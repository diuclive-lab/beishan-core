# 知识库卫生巡检 v2.5 — 每周自动执行
#
# 三步流水线：审计 → 修复 → 报告
#
# 治理框架引用：
#   - 风险分类 → docs/ABSORPTION_GOVERNANCE.md §3
#   - 升级策略 → docs/ABSORPTION_GOVERNANCE.md §4

id: kb_hygiene
output_target: chat

trigger:
  type: event
  event_type: "agent.complete"

steps:
  - id: audit
    plugin: memory_plugin
    type: kb_audit
    timeout: 60
    on_error: done
    inputs: {}
    next: repair

  - id: repair
    plugin: memory_plugin
    type: kb_repair
    timeout: 120
    on_error: done
    inputs:
      dry_run: false
    next: report

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        根据审计和修复结果，生成知识库健康报告。

        审计结果：${steps.audit.output}
        修复结果：${steps.repair.output}

        报告结构：
        1. 健康度评分
        2. 总条目数 / 问题条目数
        3. 本轮修复了什么
        4. 剩余问题
        5. 下一步建议
