# 知识条目质量审查 v2.5 — 审查入库条目质量，自动修复
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: knowledge_review

steps:
  - id: get_entry
    plugin: memory_plugin
    type: knowledge_get
    timeout: 10
    on_error: done
    inputs:
      id: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        审查以下知识条目 JSON 的每个字段，输出结构化 JSON。

        审查规则：
        - source_type: 是否选择了最合适的类型
        - title: 是否简洁有信息量
        - summary: 是否描述了核心内容
        - tags: 数量合理（2-5个）
        - topics: 是否与 tags 互补

        输出格式：
        {
          "overall": "good|fair|poor",
          "issues": [
            {"field": "字段名", "severity": "minor|major", "desc": "问题描述", "suggestion": "改进建议", "evidence": "E1/E2/E3"}
          ],
          "fixes": {"source_type": "", "title": "", "summary": "", "tags": [], "topics": [], "tasks": []},
          "summary": "审查结论"
        }

        知识条目：
        ${steps.get_entry.output}
    next: apply_fix

  - id: apply_fix
    plugin: memory_plugin
    type: knowledge_update
    timeout: 15
    on_error: done
    inputs:
      id: "${steps.get_entry.output.id}"
      source_type: "${steps.analyze.output.fixes.source_type}"
      title: "${steps.analyze.output.fixes.title}"
      summary: "${steps.analyze.output.fixes.summary}"
      tags: "${steps.analyze.output.fixes.tags}"
      topics: "${steps.analyze.output.fixes.topics}"
      tasks: "${steps.analyze.output.fixes.tasks}"
    next: report

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下信息，生成审查报告。

        原始条目 ID：${steps.get_entry.output.id}
        审查结果：${steps.analyze.output}
        修复结果：${steps.apply_fix.output}

        无问题则输出"该条目质量良好"。
