# 批量内容导入 v2.5 — 接受 URL 列表，逐个执行 content_review，汇总报告
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: batch_ingest

steps:
  - id: review
    plugin: workflow_plugin
    type: workflow_run
    timeout: 300
    on_error: done
    batch:
      foreach: "${input}"
      parallel: true
      concurrency: 3
    inputs:
      workflow: "content_review"
      input: "${item}"
    next: summary

  - id: summary
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: |
        以下是批量导入的结果，请生成汇总报告：
        - 总数：${steps.review.count} 条
        - 失败：${steps.review.errors} 条
        - 逐条结果：${steps.review.output}

        请用表格形式汇总每条的 action（store/report/discard）和关键信息。
