# ═══════════════════════════════════════════════════════════
# 右花吸收工作流 v2.5 — 吃透 + 治理 + 可演化
# ═══════════════════════════════════════════════════════════
#
# v2 → v2.5 注入（来自外部 v3 方案的结构性改进）：
#   ① 证据等级系统 — 关键设计决策必须标注证据来源（E1-E4）
#   ② 吸收等级模型 — 不是全吸或不吸，而是 L0-L4 分级决策
#   ③ 动态行为解剖 — 新增 Step 0.7（runtime 行为验证）
#   ④ 演进预测 — 新增 Step 2.7（轻量版上游演化评估）
#   ⑤ Rewrite 两级拆分 — L1 功能重写 / L2 概念重写
#   ⑥ 终止条件 — 全局 escalation policy + blocker report
#   ⑦ 风险登记册 — 贯穿所有步骤的 risk_register
#
# 保留 v2 的工程节奏，不引入 Research Protocol 形式主义。
# 每步是可执行的动作，不是模板填空。
#
# 出处：DESIGN_PRINCIPLES.md → 双花进化闭环
# v2 首次执行：2026-05-26
# v2.5 升级：2026-05-26

id: absorb_right_flower
output_target: chat

info:
  title: "右花吸收工作流 v2.5"
  description: >
    将右花已验证能力内化到底座的深度流程。
    14步：剖→依→动→探→评→缺→隐→演→预判→吸→重写→测→补→记。
    证据驱动 + 分级吸收 + 风险可见 + 可终止。
  source: "DESIGN_PRINCIPLES.md 双花进化闭环"
  version: "2.5"

# ═══════════════════════════════════════════════════════════
# META — 引用根茎治理框架
# ═══════════════════════════════════════════════════════════
#
# 证据等级 (E1-E4)      → docs/ABSORPTION_GOVERNANCE.md §1
# 吸收等级 (L0-L4)      → docs/ABSORPTION_GOVERNANCE.md §2
# 风险分类               → docs/ABSORPTION_GOVERNANCE.md §3
# 升级策略               → docs/ABSORPTION_GOVERNANCE.md §4
# 成本模型               → docs/ABSORPTION_GOVERNANCE.md §5
# 决策登记册             → docs/ABSORPTION_GOVERNANCE.md §6
# 产出物清单             → docs/ABSORPTION_GOVERNANCE.md §7
# 退出条件               → docs/ABSORPTION_GOVERNANCE.md §8
#
# 这些定义是治理标准，不随工作流版本变化。
# 工作流只引用不内嵌，保证治理层可作为独立根茎演化。

# ═══════════════════════════════════════════════════════════
# STEPS
# ═══════════════════════════════════════════════════════════

steps:

  # ═══════════════════════════════════════════════════════════
  # Step 0: 源码解剖（读透为止）
  # ═══════════════════════════════════════════════════════════
  - id: source_anatomy
    title: "源码解剖"
    description: "不只看 API，要读到能徒手画出架构图的程度。关键决策必须标注证据等级。"
    deliverables:
      - "数据流图：消息从入口到出口经过哪些模块？每个模块做什么？"
      - "关键数据结构：核心 struct/class 的字段含义？为什么这么设计？"
      - "设计决策记录：git log 中关键 commit 的 message 是什么？
        这个能力经历了几个版本迭代？每个版本改了什么？
        【关键决策必须标注证据等级，例如：E1(源码行号)、E3(commit message)】"
      - "依赖清单：这个能力依赖了哪些外部库/系统/服务？
        底座是否有对应的替代？"
      - "边界条件：原始项目中这个能力是怎么处理错误/超时/并发的？"
    pass_criteria:
      - "能画出数据流图 ✅"
      - "能说出 3 个以上设计决策及其理由，每条标注证据等级 ✅"
      - "能列出所有外部依赖 ✅"
    fail_action: "读不透就继续读，跳过等于赌博"

  # ═══════════════════════════════════════════════════════════
  # Step 0.5: 依赖与冲突预扫描（先扫雷再动手）
  # ═══════════════════════════════════════════════════════════
  - id: dep_scan
    title: "依赖与冲突预扫描"
    description: "吸收前先扫雷——工具名冲突、端口冲突、环境变量冲突、已有能力重叠。"
    checks:
      - "工具名冲突：底座 104 个工具中是否有同名或近义词？→ 合并还是新建？"
      - "端口冲突：是否需要新端口？底座已有的端口是否可用？"
      - "环境变量冲突：是否需要新 env var？底座已有的命名规范是否一致？"
      - "能力重叠：底座是否已有类似能力？→ 进入对比模式而非吸收模式"
      - "测试框架冲突：是否需要新的测试工具/依赖？"
    pass_criteria:
      - "冲突清单全部处理完毕（合并/重命名/标记废弃）✅"
      - "不存在『吸完才发现端口被占用』的情况 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 0.7: 动态行为解剖（NEW — v3 注入）
  # ═══════════════════════════════════════════════════════════
  # 理由：源码分析只能看到静态结构，runtime 行为（goroutine 泄漏、
  # timeout 链、重试风暴、资源生命周期）需要实际运行才能暴露。
  - id: runtime_anatomy
    title: "动态行为解剖"
    description: >
      源码不等于真实行为。必须通过实际运行 trace 关键路径。
      重点：资源生命周期、并发行为、故障恢复路径。
    dimensions:
      execution_path:
        - "真实运行 trace：请求从入到出经过哪些 goroutine/channel？"
        - "critical path：最耗时的环节在哪？哪些调用是串行瓶颈？"
        - "retry chain：重试怎么触发？退避策略是什么？重试风暴风险？"
        - "timeout propagation：超时传递吗？下游超时上游知道吗？"
      resource_lifecycle:
        - "memory growth：稳态内存 vs 峰值内存？有泄漏风险吗？"
        - "goroutine/thread：协程在请求结束后是否正常退出？"
        - "file descriptor / connection：资源有上限吗？用完释放吗？"
      failure_recovery:
        - "启动：依赖未就绪时怎么办？"
        - "故障恢复：依赖挂掉后恢复能自动重连吗？"
        - "shutdown：优雅退出还是直接 kill？有 draining 机制吗？"
    required_evidence:
      minimum: E2
    deliverables:
      - "RUNTIME_TRACE：至少一条完整请求的 trace 路径"
      - "HOTPATH_MAP：热点路径标注（哪个环节最可能成为瓶颈）"
      - "RESOURCE_PROFILE：goroutine / memory / fd 画像"
    pass_criteria:
      - "至少一条完整请求 trace ✅"
      - "goroutine 生命周期明确（请求结束即退出）✅"
      - "超时传递链可解释 ✅"
    fail_action: "进入辅助分析模式，写 probe 代码注入观察点"

  # ═══════════════════════════════════════════════════════════
  # Step 1: 探 — 全量实测（带边界条件的探）
  # ═══════════════════════════════════════════════════════════
  - id: probe
    title: "全量实测"
    description: "每个 API 至少测 3 种情况：正常参数、边界参数、错误参数。"
    checks:
      - "每个 method 的正常参数调用 → 返回预期结果？"
      - "每个 method 的空参数/非法参数调用 → 返回错误？不崩溃？"
      - "每个 method 的超大参数/并发调用 → 不 OOM？不 hang？"
    pass_criteria:
      - "能力地图完整（所有 method 标注 E1/E2/E3 理解等级）✅"
      - "边界条件也测试了，不只有 happy path ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2: 评 — 深度评估（带设计哲学对齐的评）
  # ═══════════════════════════════════════════════════════════
  - id: evaluate
    title: "深度评估"
    description: "四条件 + 设计哲学对齐 + 演进理解 + 差距量化"
    checks:
      - "条件1：稳定运行 > 2 周，无重大事故？"
      - "条件2：协议格式已固化，不随版本频繁变化？"
      - "条件3：有明确硬化层校验方案？"
      - "条件4：不增加内核冻结区域复杂度？"
      - "设计哲学对齐：原始项目的设计思路和底座的硬化层原则是否有冲突？
        如果有，吸收时如何调和？（必答，不能跳过）"
      - "演进理解：这个能力为什么以现在的方式存在？解决了什么问题？
        如果只在原始项目中有效（比如绑定 Python 生态），超出范围后还成立吗？"
      - "差距量化：原始项目用了多少行实现？底座实现要多少行？差距在哪？
        （参考：OpenHuman 4598 行 vs 底座 281 行 = 15:1）"
    pass_criteria:
      - "4 条件全部过 ✅"
      - "设计哲学对齐表已填写 ✅"
      - "差距量化已分析 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2.5: 缺口分析（带上游追踪的缺）
  # ═══════════════════════════════════════════════════════════
  - id: gap_analysis
    title: "缺口分析与上游追踪"
    description: "逐条记录没吸什么 + 为什么没吸 + 上游版本锁定 + 关联性风险"
    gap_record:
      - field: "未吸收能力"
        prompt: "具体能力名称"
      - field: "未吸收原因"
        options:
          - "不值得 — 对底座价值低 / 使用频率低 / 底座已有更好的"
          - "冲突 — 与现有设计原则冲突（说明具体冲突点）"
          - "太复杂 — 实现成本过高 / 依赖不兼容 / 需要外部服务"
          - "遗漏 — 就是忘了 / 偷懒了（说明补救方案）"
      - field: "上游版本"
        prompt: "原始项目当前版本号 / commit SHA（用于后续追踪）"
      - field: "不吸收的不利后果"
        prompt: "不实现这个能力，系统会有什么损失？用户在什么场景下会感受到？"
      - field: "关联性风险"
        prompt: "如果原始项目后续修改或废弃此能力，底座会受影响吗？
        这个能力在底座中的替代方案是什么？"
      - field: "补救方案"
        prompt: "组合现有工具实现相似功能 / 更新设计原则 / KNOWN_LIMITATIONS 记录"
      - field: "决策时间"
        options:
          - "临时（下次补吸）— 必须有对应的 todo/issue"
          - "永久（设计边界）— 必须写入 KNOWN_LIMITATIONS.md"
    pass_criteria:
      - "每条缺口都有『原因 + 版本 + 后果 + 关联风险 + 补救』✅"
      - "临时决策有对应的 todo ✅"
      - "永久决策有 KNOWN_LIMITATIONS 记录 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2.6: 隐式假设挖掘 + 调用模式分析
  # ═══════════════════════════════════════════════════════════
  - id: hidden_invariants
    title: "隐式假设挖掘"
    description: >
      每个系统都有隐式假设——"用户已登录"、"网络可达"、"磁盘有空间"。
      这些假设不写在代码里，但代码依赖它们。
      不挖出来，吸收后会在运行时暴露。
    checks:
      - "这个能力在原始项目中假设了什么外部条件？（网络/磁盘/权限/时间同步/环境变量）"
      - "这个能力假设了什么内部状态？（已初始化/已认证/已缓存）"
      - "这个能力在原始项目中是怎么被调用的？是主动调用还是被动触发？
        是同步还是异步？有重试吗？有超时吗？"
      - "如果假设不成立，原始项目会怎样？底座会怎样？"
    deliverables:
      - "隐式假设清单：假设内容 + 不成立的后果 + 底座的应对策略"
      - "调用模式分析：谁调它？什么时机调？失败后怎么办？"
    pass_criteria:
      - "隐式假设清单完整 ✅"
      - "每条假设有对应的底座应对策略 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2.7: 演进预测（NEW — 轻量版 v3 注入）
  # ═══════════════════════════════════════════════════════════
  # 理由：今天吸收的能力可能在 6 个月后因为上游变化变成技术债。
  # 不需要完整未来学分析，但要回答：哪些部分最容易变？
  - id: evolution_projection
    title: "演进预测（轻量版）"
    description: >
      评估上游项目未来 6-12 个月的演化方向。
      评估维度 → docs/ABSORPTION_GOVERNANCE.md §9
    deliverables:
      - "VOLATILITY_REPORT — 参见治理框架 §9.2"
      - "DRIFT_RISK — 参见治理框架 §9.2"
    pass_criteria:
      - "高变化风险接口已识别 ✅"
      - "上游漂移影响范围明确 ✅"
      - "有漂移应对策略（watch / 兼容层 / 替代方案）✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2.8: L2/L3 预判 — 核心-外围切割（NEW — 实战验证注入）
  # ═══════════════════════════════════════════════════════════
  # 理由：进入 Step 3 之前做粗粒度吸收等级预判，降低核心决策的认知负担。
  # 识别核心能力与外围依赖的大致分界线，估算 L2 vs L3 成本差。
  - id: level_predecision
    title: "L2/L3 预判 — 核心-外围切割"
    description: >
      进入 Step 3 之前先做粗粒度预判。不需要最终决策，
      但必须画出核心-外围切割图，估算 L2 和 L3 的成本差距。
    checks:
      - "画出核心-外围切割图：哪些部分是去掉右花后底座仍有价值的抽象？"
      - "外围部分能否配置化？只需要环境变量/配置文件吗？"
      - "L3 实现成本估算：完整内化需要多少新代码？有没有参考实现？"
      - "L2 实现成本估算：如果只吸核心，工期和 L3 差多少？"
    deliverables:
      - "CORE_PERIPHERY_MAP：核心-外围切割图"
      - "COST_COMPARISON：L2 vs L3 实现成本对比"
    pass_criteria:
      - "核心-外围切割图已画出 ✅"
      - "L2 和 L3 的成本差已估算 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 3: 吸 — 深度实现（分级吸收 + 三阶段）
  # ═══════════════════════════════════════════════════════════
  # v2.5 新增：吸收等级前置决策。不是所有能力都应该 full absorb。
  - id: absorb
    title: "深度吸收引擎（分级 + 三阶段）"
    description: >
      前置决策：先确定吸收等级（L0-L4），再进入三阶段实现。
      不同等级有不同的 pass criteria，不是必须 full absorb。
    gates:
      - "Step 0 / 0.5 / 0.7 / 1 / 2 / 2.6 / 2.7 全部完成"
      - "吸收等级已确定（回答：为什么不是 L0？为什么不是 L1？为什么需要 L3？）"
      - "risk register 已初始化"
      - "escalation policy 已就绪"
    absorption_level_decision:
      required_questions:
        - "L0 check: 这个能力只是研究价值吗？如果是，什么时候重新评估？"
        - "L1 check: 当前右花协议是否已满足需求？包装就够了吗？"
        - "L2 check: 如果只吸核心（L2），核心是什么？用 decision_heuristic 做切割。
          切割后的外围部分能否配置化/独立运行？"
        - "L3 check: 为什么 L2 不够？
          (a) 核心本身在底座不存在，必须新写？
          (b) 外围太薄，拆了反而增加复杂度？
          (c) 全量接管的场景太多，部分吸收导致架构分裂？"
        - "L4 check: 是否需要超越原设计（rewrite_and_supersede）？"
      output: "absorption_level_decision + 决策理由 + 核心-外围切割说明"
    phases:
      phase1:
        name: "prototype — 最小验证"
        checks:
          - "最小实现可运行？"
          - "行为接近原始项目？"
          - "关键 invariant 保留？"
        outputs: ["PROTOTYPE_RESULT"]
      phase2:
        name: "compatibility — 兼容验证"
        checks:
          - "旧行为保持？"
          - "协议兼容？"
          - "调用链未断裂？"
          - "kernel frozen area untouched？"
        outputs: ["COMPATIBILITY_REPORT"]
      phase3:
        name: "hardening — 生产硬化"
        checks:
          - "parameter validation coverage"
          - "error handling completeness"
          - "timeout propagation correct"
          - "resource cleanup verified"
        outputs: ["HARDENING_REPORT"]
    pass_criteria:
      - "三阶段通过（L0-L1 只过 phase1）✅"
      - "kernel/ 零改动 ✅"
      - "原有协议调用保留 ✅"
    fail_action: "phase1 失败 → 理解不够，返回 Step 0。
      phase2 失败 → 破坏兼容性，重新设计。
      phase3 失败 → 没有硬化层兜底，不能上线。
      连续失败 → 进入 escalation policy。"

  # ═══════════════════════════════════════════════════════════
  # Step 3.5: 无源码重实现测试（L1/L2 两级）
  # ═══════════════════════════════════════════════════════════
  # v2.5 拆为两级：L1 功能重写（行为一致）+ L2 概念重写（保持核心 invariant）
  # 避免"必须写出完全相同的代码"导致合理吸收被误判失败。
  - id: rewrite_test
    title: "无源码重实现验证（L1/L2 两级）"
    description: >
      关上原始项目的代码。只凭 Step 0-3 的理解独立重写。
      这是检验"真懂还是假懂"的唯一标准。
      两级可选——不要求每次都 L2，但至少过 L1。
    levels:
      L1:
        name: "functional_rewrite — 行为级重写"
        requirement: "关闭原代码，独立重建核心逻辑，接口和行为兼容"
        checks:
          - "核心接口与原始项目一致？"
          - "输入输出一致？"
          - "边界行为一致？"
          - "failure semantics 一致？"
      L2:
        name: "conceptual_rewrite — 概念级重写"
        requirement: "允许不同实现，但核心 invariant 不变"
        checks:
          - "核心模型 / 数据流是否仍成立？"
          - "设计 tradeoff 是否清晰？"
          - "为什么这个实现优于或等价于原设计？"
    outputs:
      - "REWRITE_VALIDATION"
      - "DESIGN_DIFFERENCE_REPORT（如果与原始实现有差异）"
    pass_criteria:
      - "L1 pass：核心行为与原始项目一致 ✅"
      - "L2 pass（如果选择）：核心 invariant 保持 + tradeoff 清晰 ✅"
    fail_action: >
      L1 失败 → 没吃透，返回 Step 0 补充理解。
      L2 失败但 L1 通过 → 吸收等级降为 L1（wrap），记录 boundary decision。
      连续失败 >= 2 次 → 进入 escalation policy，重新评估 absorption level。

  # ═══════════════════════════════════════════════════════════
  # Step 4: 测 — 三层验证（带回归的测）
  # ═══════════════════════════════════════════════════════════
  - id: verify
    title: "三层验证 + 全量回归"
    description: "单元→集成→全链路，外加全量回归测试确保不破坏现有功能"
    checks:
      - "L1 单元测试：go test -run <吸收范围>"
      - "L2 集成测试：写测试直接调用吸收的函数（绕开 tool handler），验证核心逻辑"
      - "L3 全链路：通过 curl 调用实际端点，验证完整调用链"
      - "全量回归：go test ./... 全部通过"
      - "旧行为未破坏（104 工具的测试全部通过）"
      - "错误路径（无 API key、服务不可用、超时）不崩溃"
      - "HTTP 外部调用路径全部检查认证方式（不要漏 Authorization 头）"
      - "README 中的烟雾测试脚本能跑通"
      - "【v2.5 新增】如果 absorption level = L1（wrap），验证 adapter 层面的健康检查 + 故障转移"
    pass_criteria:
      - "L1 ✅ L2 ✅ L3 ✅"
      - "go test ./... ✅"
      - "README 烟雾测试 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 5: 补 — 广度检查 + 注册表扫描 + 风险登记
  # ═══════════════════════════════════════════════════════════
  - id: breadth
    title: "广度补全 + 注册表扫描 + 风险登记"
    description: "不仅查调用链，还要扫工具注册表、插件注册表、环境变量表、风险登记册"
    checks:
      - "调用链：直接调用者、间接调用链、数据流向全部覆盖"
      - "工具注册表：检查 tools.Registry 是否有同名/近义词工具"
      - "插件注册表：检查 plugins/ 是否有同名/同类插件"
      - "toolHost 映射：Go-DSL 引擎的 toolHost 是否更新？"
      - "环境变量：是否需要新 env var？命名是否遵循现有规范？"
      - "risk register 更新：所有已识别风险都有 mitigation 和 owner"
      - "残差风险已明确标注（已知但未解决的风险）"
      - "文档中的调用图/描述是否需要更新？"
      - "README/CLAUDE.md/CHANGELOG 中的工具数是否需要更新？"
    pass_criteria:
      - "所有调用链覆盖 ✅"
      - "注册表无冲突 ✅"
      - "risk register 完整 ✅"
      - "不存在『改了 A 但 B 还在走旧路』的情况 ✅"
    fail_action: "有一个孤岛就返回 Step 3"

  # ═══════════════════════════════════════════════════════════
  # Step 6: 记 — 全量文档化 + 版本锁定 + 终止记录
  # ═══════════════════════════════════════════════════════════
  - id: document
    title: "全量文档化 + 版本锁定 + 治理收口"
    description: >
      记录吸收了什么 + 没吸什么 + 上游版本 + 更新追踪方式 + 风险状态。
      v2.5 新增：如果吸收中触发了 escalation policy，必须输出 BLOCKER_REPORT。
    checks:
      - "DESIGN_PRINCIPLES.md 参考项目已更新？"
      - "MERGE_DECISIONS.md 新增决策记录？"
      - "吸收记录：具体能力 + 内化位置 + 文件清单"
      - "缺口记录：没吸什么 + 原因 + 后果 + 补救（来自 Step 2.5）"
      - "上游版本锁定：原始项目的版本号/commit SHA"
      - "更新检查机制：原始项目更新后如何感知（手动/Watch/Webhook）"
      - "关联性分析：如果原始项目废弃此能力，底座如何应对？"
      - "右花是协议而非单一项目——文档中明确标注"
      - "risk register 归档：最终风险状态 + 残差风险 + 漂移风险"
      - "【如果触发了 escalation】是否输出了 BLOCKER_REPORT？block 条件是否已消除？"
    blocker_report:
      required_when: "escalation policy 被触发且未能解决"
      fields:
        - "blocker 描述"
        - "impact 范围"
        - "root cause"
        - "已尝试的修复"
        - "重试条件"
        - "回退策略"
    final_certification:
      states:
        CERTIFIED: "允许进入生产体系"
        CONDITIONALLY_CERTIFIED: "允许上线但有已知限制"
        RESEARCH_ONLY: "理解完成，不允许生产吸收（对应 L0）"
        BLOCKED: "禁止吸收"
    pass_criteria:
      - "参考项目已更新 ✅"
      - "决策记录已写入 ✅"
      - "上游版本已锁定 ✅"
      - "更新检查机制已建立 ✅"
      - "risk register 已归档 ✅"
      - "最终认证状态明确 ✅"

# ── 完成确认 ──────────────────────────────────
final_check:
  title: "吸收完成确认"
  items:
    - "14步全部走完 ✅"
    - "kernel/ 零改动 ✅"
    - "吸收等级决策明确（L0-L4）并记录理由 ✅"
    - "证据链完整（关键设计决策有 E1-E4 标注）✅"
    - "risk register 完整，残差风险可见 ✅"
    - "上游版本已锁定，更新可追踪 ✅"
    - "演进风险已评估 ✅"
    - "关联性风险已评估 ✅"
    - "缺口分析完整，无『忘了、没发现』的遗漏 ✅"
  sign_off: "需要用户确认吸收完成"
