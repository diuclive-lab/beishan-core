# ═══════════════════════════════════════════════════════════
# 右花吸收工作流 v2 — 从"流程正确"到"吃透为止"
# ═══════════════════════════════════════════════════════════
#
# 设计原则：每步必须有可验证的产出物，不能只写"检查完毕"。
# 遗漏一点细节就会出问题——这条工作流本身也不能有遗漏。
#
# v1 问题回顾：
#   - 没强制读源码 → 吸了 281 行但原版 4598 行，不知道错过了什么
#   - 没检查设计哲学冲突 → 用"硬化层原则"当挡箭牌，实则是底座没能力
#   - 没记录上游版本 → 原始项目更新后底座不知
#   - 没扫描依赖冲突 → 吸了 A 但没吸 A 依赖的 B 和 C
#
# 出处：DESIGN_PRINCIPLES.md → 双花进化闭环
# 首次执行：2026-05-24 OpenHuman memory.search（v1）
# 本次重构：2026-05-26（v2）

id: absorb_right_flower

info:
  title: "右花吸收工作流 v2"
  description: "将右花已验证能力内化到底座的深度流程。11步：剖→依→探→评→缺→隐→吸→重写→测→补→记"
  source: "DESIGN_PRINCIPLES.md 双花进化闭环"
  first_run: "2026-05-24 OpenHuman memory.search"
  version: "2.0"

steps:

  # ═══════════════════════════════════════════════════════════
  # Step 0: 源码解剖（读透为止）
  # ═══════════════════════════════════════════════════════════
  # 产出物：源码分析报告，必须包含数据流图 + 关键数据结构 + 设计决策
  - id: source_anatomy
    title: "源码解剖"
    description: "不只看 API，要读到能徒手画出架构图的程度。"
    deliverables:
      - "数据流图：消息从入口到出口经过哪些模块？每个模块做什么？"
      - "关键数据结构：核心 struct/class 的字段含义？为什么这么设计？"
      - "设计决策记录：git log 中关键 commit 的 message 是什么？
        这个能力经历了几个版本迭代？每个版本改了什么？"
      - "依赖清单：这个能力依赖了哪些外部库/系统/服务？
        底座是否有对应的替代？"
      - "边界条件：原始项目中这个能力是怎么处理错误/超时/并发的？"
    pass_criteria:
      - "能画出数据流图 ✅"
      - "能说出 3 个以上设计决策及其理由 ✅"
      - "能列出所有外部依赖 ✅"
    fail_action: "读不透就继续读，跳过等于赌博"

  # ═══════════════════════════════════════════════════════════
  # Step 0.5: 依赖与冲突预扫描（先扫雷再动手）
  # ═══════════════════════════════════════════════════════════
  - id: dep_scan
    title: "依赖与冲突预扫描"
    description: "吸收前先扫雷——工具名冲突、端口冲突、环境变量冲突、已有能力重叠。"
    checks:
      - "工具名冲突：底座 104 个工具中是否有同名或近义词？→ 合并还是新建？"
      - "端口冲突：是否需要新端口？底座已有的端口是否可用？"
      - "环境变量冲突：是否需要新 env var？底座已有的命名规范是否一致？"
      - "能力重叠：底座是否已有类似能力？→ 进入对比模式而非吸收模式"
      - "测试框架冲突：是否需要新的测试工具/依赖？"
    pass_criteria:
      - "冲突清单全部处理完毕（合并/重命名/标记废弃）✅"
      - "不存在『吸完才发现端口被占用』的情况 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 1: 探 — 全量实测（带边界条件的探）
  # ═══════════════════════════════════════════════════════════
  - id: probe
    title: "全量实测"
    description: "每个 API 至少测 3 种情况：正常参数、边界参数、错误参数。"
    checks:
      - "每个 method 的正常参数调用 → 返回预期结果？"
      - "每个 method 的空参数/非法参数调用 → 返回错误？不崩溃？"
      - "每个 method 的超大参数/并发调用 → 不 OOM？不 hang？"
    pass_criteria:
      - "能力地图完整（所有 method 标注 ✅/⚠️/❌）✅"
      - "边界条件也测试了，不只有 happy path ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2: 评 — 深度评估（带设计哲学对齐的评）
  # ═══════════════════════════════════════════════════════════
  - id: evaluate
    title: "深度评估"
    description: "四条件 + 设计哲学对齐 + 演进理解 + 差距量化"
    checks:
      - "条件1：稳定运行 > 2 周，无重大事故？"
      - "条件2：协议格式已固化，不随版本频繁变化？"
      - "条件3：有明确硬化层校验方案？"
      - "条件4：不增加内核冻结区域复杂度？"
      - "设计哲学对齐：原始项目的设计思路和底座的硬化层原则是否有冲突？
        如果有，吸收时如何调和？（必答，不能跳过）"
      - "演进理解：这个能力为什么以现在的方式存在？解决了什么问题？
        如果只在原始项目中有效（比如绑定 Python 生态），超出范围后还成立吗？"
      - "差距量化：原始项目用了多少行实现？底座实现要多少行？差距在哪？
        （参考：OpenHuman 4598 行 vs 底座 281 行 = 15:1）"
    pass_criteria:
      - "4 条件全部过 ✅"
      - "设计哲学对齐表已填写 ✅"
      - "差距量化已分析 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2.5: 缺口分析（带上游追踪的缺）
  # ═══════════════════════════════════════════════════════════
  - id: gap_analysis
    title: "缺口分析与上游追踪"
    description: "逐条记录没吸什么 + 为什么没吸 + 上游版本锁定 + 关联性风险"
    gap_record:
      - field: "未吸收能力"
        prompt: "具体能力名称"
      - field: "未吸收原因"
        options:
          - "不值得 — 对底座价值低 / 使用频率低 / 底座已有更好的"
          - "冲突 — 与现有设计原则冲突（说明具体冲突点）"
          - "太复杂 — 实现成本过高 / 依赖不兼容 / 需要外部服务"
          - "遗漏 — 就是忘了 / 偷懒了（说明补救方案）"
      - field: "上游版本"
        prompt: "原始项目当前版本号 / commit SHA（用于后续追踪）"
      - field: "不吸收的不利后果"
        prompt: "不实现这个能力，系统会有什么损失？用户在什么场景下会感受到？"
      - field: "关联性风险"
        prompt: "如果原始项目后续修改或废弃此能力，底座会受影响吗？
        这个能力在底座中的替代方案是什么？"
      - field: "补救方案"
        prompt: "组合现有工具实现相似功能 / 更新设计原则 / KNOWN_LIMITATIONS 记录"
      - field: "决策时间"
        options:
          - "临时（下次补吸）— 必须有对应的 todo/issue"
          - "永久（设计边界）— 必须写入 KNOWN_LIMITATIONS.md"
    pass_criteria:
      - "每条缺口都有『原因 + 版本 + 后果 + 关联风险 + 补救』✅"
      - "临时决策有对应的 todo ✅"
      - "永久决策有 KNOWN_LIMITATIONS 记录 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 2.6: 隐式假设挖掘 + 调用模式分析
  # ═══════════════════════════════════════════════════════════
  # 经验：OpenHuman SESSION_EXPIRED — 不是代码逻辑，是隐式假设（用户已登录）。
  # 如果不挖掘隐式假设，吸收后会在运行时暴露。
  - id: hidden_invariants
    title: "隐式假设挖掘"
    description: >
      每个系统都有隐式假设——"用户已登录"、"网络可达"、"磁盘有空间"。
      这些假设不写在代码里，但代码依赖它们。
      不挖出来，吸收后会在运行时暴露。
    checks:
      - "这个能力在原始项目中假设了什么外部条件？（网络/磁盘/权限/时间同步/环境变量）"
      - "这个能力假设了什么内部状态？（已初始化/已认证/已缓存）"
      - "这个能力在原始项目中是怎么被调用的？是主动调用还是被动触发？
        是同步还是异步？有重试吗？有超时吗？"
      - "如果假设不成立，原始项目会怎样？底座会怎样？"
    deliverables:
      - "隐式假设清单：假设内容 + 不成立的后果 + 底座的应对策略"
      - "调用模式分析：谁调它？什么时机调？失败后怎么办？"
    pass_criteria:
      - "隐式假设清单完整 ✅"
      - "每条假设有对应的底座应对策略 ✅"


  # ═══════════════════════════════════════════════════════════
  # Step 3: 吸 — 深度实现（分三阶段的吸）
  # ═══════════════════════════════════════════════════════════
  - id: absorb
    title: "深度实现（三阶段）"
    description: >
      阶段一：原型验证。先在沙箱/独立目录写最小实现。
      阶段二：兼容层。确保不破坏现有 104 工具的行为。
      阶段三：硬化覆盖。通过硬化层验收。
    checks:
      - "阶段一：原型——最小实现能跑吗？和原始项目的结果一致吗？"
      - "阶段二：兼容——现有 104 工具全部测试通过？kernel/ 零改动？"
      - "阶段三：硬化——经过 ValidateAndExecute 校验？参数/错误/边界覆盖？"
      - "kernel/ 是否零改动？"
      - "是否保留了原有协议调用（不因内化而失效）？"
    pass_criteria:
      - "三阶段全部通过 ✅"
      - "kernel/ 零改动 ✅"
      - "原有协议调用保留 ✅"
    fail_action: "阶段一失败→说明理解不够，返回 Step 0.
      阶段二失败→破坏兼容性，重新设计。
      阶段三失败→没有硬化层兜底，不能上线。"

  # ═══════════════════════════════════════════════════════════
  # Step 3.5: 无源码重实现测试（终极检验）
  # ═══════════════════════════════════════════════════════════
  # 检验标准：关上原始项目的代码，只凭理解重写。
  # 写不出来 → 没吃透 → 返回 Step 0。
  - id: rewrite_test
    title: "无源码重实现测试"
    description: >
      关上原始项目的代码。只凭 Step 0-3 的理解，独立重写核心逻辑。
      这是检验"真懂还是假懂"的唯一标准。
    steps:
      - "闭上原始项目的代码文件"
      - "从空白文件开始，只靠理解写出核心实现"
      - "完成后对比原始实现：接口一致吗？行为一致吗？边界处理一致吗？"
      - "如果有差异：是改进还是遗漏？是底座的设计选择还是没理解透？"
    pass_criteria:
      - "核心接口与原始项目一致 ✅"
      - "核心行为与原始项目一致 ✅"
      - "边界情况处理与原始项目一致或更好 ✅"
    fail_action: >
      写不出来 → 没吃透，返回 Step 0。
      有差异需要判断是故意改进还是遗漏。
      如果是改进 → 记录到设计决策。
      如果是遗漏 → 返回 Step 0 补充理解。


  # ═══════════════════════════════════════════════════════════
  # Step 4: 测 — 三层验证（带回归的测）
  # ═══════════════════════════════════════════════════════════
  - id: verify
    title: "三层验证 + 全量回归"
    description: "单元→集成→全链路，外加全量回归测试确保不破坏现有功能"
    checks:
      - "L1 单元测试：go test -run <吸收范围>"
      - "L2 集成测试：写测试直接调用吸收的函数（绕开 tool handler），验证核心逻辑"
      - "L3 全链路：通过 curl 调用实际端点，验证完整调用链"
      - "全量回归：go test ./... 全部通过"
      - "旧行为未破坏（104 工具的测试全部通过）"
      - "错误路径（无 API key、服务不可用、超时）不崩溃"
      - "HTTP 外部调用路径全部检查认证方式（不要漏 Authorization 头）"
      - "README 中的烟雾测试脚本能跑通"
    pass_criteria:
      - "L1 ✅ L2 ✅ L3 ✅"
      - "go test ./... ✅"
      - "README 烟雾测试 ✅"

  # ═══════════════════════════════════════════════════════════
  # Step 5: 补 — 广度检查 + 注册表扫描
  # ═══════════════════════════════════════════════════════════
  - id: breadth
    title: "广度补全 + 注册表扫描"
    description: "不仅查调用链，还要扫工具注册表、插件注册表、环境变量表"
    checks:
      - "调用链：直接调用者、间接调用链、数据流向全部覆盖"
      - "工具注册表：检查 tools.Registry 是否有同名/近义词工具"
      - "插件注册表：检查 plugins/ 是否有同名/同类插件"
      - "toolHost 映射：Go-DSL 引擎的 toolHost 是否更新？"
      - "环境变量：是否需要新 env var？命名是否遵循现有规范？"
      - "文档中的调用图/描述是否需要更新？"
      - "README/CLAUDE.md/CHANGELOG 中的工具数是否需要更新？"
    pass_criteria:
      - "所有调用链覆盖 ✅"
      - "注册表无冲突 ✅"
      - "不存在『改了 A 但 B 还在走旧路』的情况 ✅"
    fail_action: "有一个孤岛就返回 Step 3"

  # ═══════════════════════════════════════════════════════════
  # Step 6: 记 — 全量文档化（带版本锁定的记）
  # ═══════════════════════════════════════════════════════════
  - id: document
    title: "全量文档化 + 版本锁定"
    description: "记录吸收了什么 + 没吸什么 + 上游版本 + 更新追踪方式"
    checks:
      - "DESIGN_PRINCIPLES.md 参考项目已更新？"
      - "MERGE_DECISIONS.md 新增决策记录？"
      - "吸收记录：具体能力 + 内化位置 + 文件清单"
      - "缺口记录：没吸什么 + 原因 + 后果 + 补救（来自 Step 2.5）"
      - "上游版本锁定：原始项目的版本号/commit SHA"
      - "更新检查机制：原始项目更新后如何感知（手动/Watch/Webhook）"
      - "关联性分析：如果原始项目废弃此能力，底座如何应对？"
      - "右花是协议而非单一项目——文档中明确标注"
    pass_criteria:
      - "参考项目已更新 ✅"
      - "决策记录已写入 ✅"
      - "上游版本已锁定 ✅"
      - "更新检查机制已建立 ✅"

# ── 完成确认 ──────────────────────────────────
final_check:
  title: "吸收完成确认"
  items:
    - "11步全部走完 ✅"
    - "kernel/ 零改动 ✅"
    - "上游版本已锁定，更新可追踪 ✅"
    - "关联性风险已评估 ✅"
    - "缺口分析完整，无『忘了、没发现』的遗漏 ✅"
  sign_off: "需要用户确认吸收完成"
