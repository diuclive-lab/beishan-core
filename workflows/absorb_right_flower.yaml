# ═══════════════════════════════════════════════════════════
# 右花吸收工作流 — 将右花已验证能力内化到底座
# ═══════════════════════════════════════════════════════════
#
# 出处：DESIGN_PRINCIPLES.md → 双花进化闭环
# 首次执行：2026-05-24 OpenHuman memory.context_query → P0 向量语义检索
#
# 设计参考：workflows/code_deep_analyze.yaml
#   - code_deep_analyze 的分阶段设计（度量→分析→合成→闭环）启发了本工作流的
#     探→评→吸→测→补→记 六阶段结构
#   - code_deep_analyze 的"并行静态度量"模式可用于 Step 1 的能力探测
#   - code_deep_analyze 的"逐文件分析→综合→入库"闭环可用于 Step 6 的吸收归档
#
# 经验积累（每次执行后更新）：
#
#   v1 (2026-05-24, OpenHuman P0 吸收):
#   - 【深度/广度陷阱】改了 searchMemoryFull 但忘了改 KnowledgeSearch（工具入口）。
#     广度检查必须在同一轮完成，不能等"下次"
#   - 【HTTP 认证遗漏】tryEmbedding 使用 http.Post 没有 Authorization 头。
#     所有外部 HTTP 调用路径必须检查认证方式
#   - 【测试预期要基于真实数据】测试用例的 wantTop 预期遇到 237 条真实知识后
#     全部打脸。bench 测试必须考虑已有数据的分布
#   - 【模型选择影响运行效率】Qwen 27B 做 embedding 太重（~4s/条），
#     轻量专用模型（nomic-embed-text 137MB）更合适
#   - 【异步路径要单独测试】async batchFillEmbedding 的完成时机影响搜索结果，
#     测试设计时要考虑"embedding 就绪前"和"就绪后"两种状态
#   - 【全链路验证层次】
#   - 【缺口分析遗漏】第三次吸收 (agent 委派) 写了 281 行但原版 4598 行。
#     工作流只记录了"吸了什么"，没记录"故意没吸什么"。
#     多次吸收后，未吸收的缺口会累积成看不见的债务。
#     新增 Step 2.5 缺口分析，强制记录未吸收项及理由
#单元测试→Go 直接调用→HTTP API 调用，三层验证缺一不可。
#     Go test 通过了但 API 没通过 → 发现 KnowledgeSearch 未接入管道
#
# 用法：
#   1. 右花已通车，选中待吸收能力
#   2. 执行此工作流
#   3. 每步完成后标记结果，不通过时终止或调整
#   4. 执行完成后，将本"经验积累"段追加新条目
#
# 字段说明：
#   check:       检查项描述
#   pass_criteria: 通过标准（满足才可进入下一步）
#   fail_action:   不通过时的处理方式
#   output:       本步骤产生的文档/产出
#
# ═══════════════════════════════════════════════════════════

id: absorb_right_flower

info:
  title: "右花吸收工作流"
  description: "将右花已验证能力内化到底座的标准化流程。六步：探→评→吸→测→补→记"
  source: "DESIGN_PRINCIPLES.md 双花进化闭环"
  first_run: "2026-05-24 OpenHuman memory.search"

# ── Step 1: 探 — 全量实测右花能力 ─────────────
steps:
  - id: probe
    title: "探测右花能力"
    description: "通过 probe-methods 和直接 RPC 测试，摸清右花全部能力"
    checks:
      - "列出所有可用 method（adapter methodMap + 右花原生 RPC）"
      - "每个 method 实测：正确参数、错误参数、边界情况"
      - "记录响应格式、认证方式、延迟特征"
      - "区分『通过协议调用』和『值得吸收内化』"
    pass_criteria:
      - "能力地图完整（所有 method 标注 ✅/⚠️/❌）"
      - "每个标注有实测依据而非猜测"
    fail_action: "返回探测，补全遗漏的 method"
    output: "docs/reports/<right_flower>_capability_map.md"

  # ── Step 2: 评 — 评估吸收价值 ───────────────
  - id: evaluate
    title: "评估吸收价值"
    description: "对照吸收四条件，判断哪些能力值得内化到底座"
    checks:
      - "条件1：稳定运行 > 2 周，无重大事故？"
      - "条件2：协议格式已固化，不随版本频繁变化？"
      - "条件3：有明确硬化层校验方案？"
      - "条件4：不增加内核冻结区域复杂度？"
      - "深度：能力本身完整可用吗？"
      - "广度：谁调用它？它调用谁？数据流向？"
    pass_criteria:
      - "至少满足条件 1-4 才进入吸阶段"
      - "不满足但价值高 → 标记为 P2 保留，等待稳定"
      - "不满足且价值低 → 关闭吸收，保持协议调用"
    fail_action: "标记为『保持协议调用』，记录理由"
    output: "吸收评估表（inline in capability_map.md）"

  # ── Step 2.5: 缺口分析（⚠️ 最容易被跳过的步骤）───────
  # 经验：第三次吸收（agent 委派）写了 281 行，但原版 4,598 行。
  # 如果不记录"故意没做什么"，多次吸收后缺口累积成看不见的债务。
  - id: gap_analysis
    title: "缺口分析"
    description: "对比原版能力清单，明确标记『没吸收什么』及理由。这是防止吸收债务累积的关键步骤。"
    checks:
      - "原版有哪些能力我们没有实现？逐条列出"
      - "每条未实现的理由是什么？（范围外 / 太复杂 / 底座已有类似能力 / 依赖不兼容）"
      - "未吸收项中是否有影响核心功能的？→ 如果是，升级为 P0 补吸"
      - "未吸收项是否已记录到文档或 todo_backlog？"
    pass_criteria:
      - "所有未吸收项有关联的 issue/todo 或 KNOWN_LIMITATIONS 记录 ✅"
      - "不存在『忘了、没发现』的遗漏 ✅"
    fail_action: "用户确认未吸收项可接受后才进入 Step 3"
    output: "缺口分析表（inline in absorption record）"

  # ── Step 3: 吸 — 深度实现 ───────────────────
  - id: absorb
    title: "深度实现"
    description: "将选中能力内化到 internal/ 或 plugins/，硬化层验收覆盖"
    checks:
      - "改动只涉及 internal/ 或 plugins/？kernel/ 是否零接触？"
      - "吸收的代码是否经过硬化层验收？"
      - "是否有对应的单元测试？"
      - "原有协议调用是否保留（不因内化而失效）？"
    pass_criteria:
      - "go build ./... ✅"
      - "go vet ./... ✅"
      - "新增测试通过 ✅"
      - "kernel/ 零改动 ✅"
    fail_action: "如果是 kernel 改动，需要用户审批（见铁律一）"
    output: "internal/ 或 plugins/ 中的代码改动"

  # ── Step 4: 测 — 三层验证 ─────────────────────
  # 经验：Go test 通过了不代表 API call 也通。
  # 必须逐层验证：单元 → 直接调用 → HTTP API
  - id: verify
    title: "三层验证"
    description: "代码 pass 不够，全链路通过才行。单元→直接→API 逐层上升"
    checks:
      - "L1 单元测试：go test -run <吸收范围> ./... ✅"
      - "L2 直接调用：写小测试直接调用吸收的函数（绕开 tool handler），验证核心逻辑"
      - "L3 HTTP API：通过 curl 调用实际端点，验证完整调用链"
      - "旧行为未破坏（向后兼容）"
      - "错误路径（无 API key、服务不可用、超时）不崩溃"
      - "异步路径（如后台 batchFillEmbedding）单独设计测试，验证就绪前和就绪后两种状态"
      - "HTTP 外部调用路径全部检查认证方式（不要漏 Authorization 头）"
    pass_criteria:
      - "L1 单元测试通过 ✅"
      - "L2 直接调用验证核心逻辑 ✅"
      - "L3 HTTP API 返回正确结果 ✅"
      - "测试覆盖真实数据分布（不假设知识库为空）✅"
    fail_action: "L2 失败 → 返回 Step 3；L3 失败 → 检查调用链，可能是广度问题"

  # ── Step 5: 补 — 广度补全 ───────────────────
  - id: breadth
    title: "广度补全"
    description: "检查所有调用链：被谁调用、调用谁、数据流向。这是最容易被跳过的步骤，也是产生孤岛的根源"
    checks:
      - "直接调用者：检查所有调用了修改函数的地方"
      - "间接调用链：数据从入口到出口经过哪些层"
      - "工具注册入口：如果修改了检索逻辑，对应的 tool registration handler 也改了吗？"
      - "是否存在另一条路径做同样的事（新旧函数并行）？"
      - "文档中的调用图/描述是否需要更新？"
    pass_criteria:
      - "所有调用链覆盖 ✅"
      - "不存在『改了 A 但 B 还在走旧路』的情况 ✅"
    fail_action: "有一个孤岛就返回 Step 3"

  # ── Step 6: 记 — 文档化吸收来源 ──────────────
  - id: document
    title: "文档化吸收来源"
    description: "在 DESIGN_PRINCIPLES.md 参考项目部分标注吸收来源"
    checks:
      - "DESIGN_PRINCIPLES.md 参考项目已更新？"
      - "MERGE_DECISIONS.md 新增决策记录？"
      - "吸收了什么：具体能力和内化位置"
      - "没吸收什么及原因：保持透明"
      - "右花是协议而非单一项目——文档中明确标注"
    pass_criteria:
      - "DESIGN_PRINCIPLES.md 参考项目已更新 ✅"
      - "MERGE_DECISIONS.md 决策记录已写入 ✅"
    fail_action: "标记为 TODO，阻塞 PR"

# ── 完成确认 ──────────────────────────────────
final_check:
  title: "吸收完成确认"
  items:
    - "右花该能力仍可通过协议调用（双通道不冲突）"
    - "底座未因吸收而膨胀（kernel/ 零改动）"
    - "吸收来源可追溯（参考项目义务）"
    - "广度检查确认零孤岛"
  sign_off: "需要用户确认吸收完成"
