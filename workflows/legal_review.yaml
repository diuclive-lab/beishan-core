# 法律审查工作流 v2.5
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: legal_review
output_target: chat
steps:
  - id: cold_start
    plugin: cold_start_plugin
    type: cold_start
    timeout: 30
    on_error: done
    inputs:
      contract_text: "${input}"
    next: legal_search

  - id: legal_search
    plugin: legal_search_plugin
    type: legal_search
    timeout: 30
    retry: 1
    on_error: done
    inputs:
      query: "${steps.cold_start.output}"
    next: clause_analysis

  - id: clause_analysis
    plugin: clause_analyzer_plugin
    type: clause_analysis
    timeout: 30
    on_error: done
    inputs:
      contract: "${input}"
      profile: "${steps.cold_start.output}"
      laws: "${steps.legal_search.output}"
    next: write_report

  - id: write_report
    plugin: legal_write_plugin
    type: legal_generate_report
    timeout: 30
    on_error: done
    inputs:
      analysis_report: "${steps.clause_analysis.output}"
      document_type: "contract_review"
      output_format: "markdown"
