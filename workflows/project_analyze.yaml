# 项目深度分析 v2 — README/源码 → 架构分析 → 知识入库 → 洞察闭环
#
# 设计原则：
#   - L3 工具优先：github_readme 拆 URL 和分支降级是工具层职责，工作流不拼接 URL
#   - 双通道获取：GitHub 项目走 github_readme，其他项目降级 web_fetch
#   - 洞察必闭环：分析结果入库后自动触发 insight_followup 转为待办
#   - 零检索：分析步骤用 no_retrieval，避免知识库噪声干扰 LLM 判断
#
# 流程：
#   1. fetch:        github_readme 获取项目 README（L3，约 ¥0）
#   2. fetch_web:    降级通道，非 GitHub 项目走 web_fetch（约 ¥0）
#   3. analyze:      DeepSeek 结构化分析（约 ¥0.03）
#   4. store:        分析结果入库（约 ¥0）
#   5. followup:     insight_followup 自动创建待办（约 ¥0.02）
#
# 总成本估算：
#   DeepSeek：1-2 次，约 2000 tokens ≈ ¥0.05
#   L3 工具：github_readme/web_fetch 各 1 次，零 LLM 成本
#   insight_followup：1 次工作流，约 ¥0.02
#
# 触发方式：
#   手动：
#     POST /api/chat
#     {"recipient":"workflow_plugin","type":"workflow_run",
#      "payload":{"workflow":"project_analyze","input":"<项目URL>"}}
#   自动：由 agent_observer 工作流触发（agent_observer.yaml）

id: project_analyze

steps:
  # ── Step 1: 获取项目 README（L3 github_readme 工具） ──
  - id: fetch
    plugin: memory_plugin
    type: github_readme
    timeout: 60
    retry: 1
    retry_delay: 5
    on_error: fetch_web
    inputs:
      url: "${input}"
    next: analyze

  # ── 降级：非 GitHub 项目用 web_fetch ──
  - id: fetch_web
    plugin: search_plugin
    type: web_fetch
    timeout: 60
    retry: 1
    retry_delay: 5
    on_error: done
    inputs:
      url: "${input}"
    next: analyze

  # ── Step 2: 深度分析 ──
  - id: analyze
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 5
    inputs:
      mode: "no_retrieval"
      message: >-
        分析以下开源项目内容，输出结构化 JSON：

        {
          "title": "项目名称",
          "tagline": "一句话概括项目定位",
          "tech_stack": ["主要技术栈"],
          "architecture": "架构特点（30字内）",
          "highlights": ["3-5个最值得关注的设计决策或工程实践"],
          "beishan_relevance": "对 beishan-core 可借鉴的具体点",
          "code_quality": "代码质量评估: excellent/good/fair/poor"
        }

        项目 README 内容：
        ${steps.fetch.output.content}

        只输出 JSON，不要其他文字。
    next: store

  # ── Step 3: 知识入库 ──
  - id: store
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "code"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.tagline} | ${steps.analyze.output.architecture} | 借鉴: ${steps.analyze.output.beishan_relevance}"
      tags: "${steps.analyze.output.tech_stack}"
      content: "URL: ${input}\n亮点:\n${steps.analyze.output.highlights}\n\n完整分析: ${steps.analyze.output}"
    next: followup

  # ── Step 4: 洞察跟进 — 评估可借鉴点，创建待办（非核心，失败不阻塞）──
  - id: followup
    plugin: workflow_plugin
    type: workflow_run
    timeout: 120
    on_error: done
    inputs:
      workflow: "insight_followup"
      input: "${steps.store.output.id}"
