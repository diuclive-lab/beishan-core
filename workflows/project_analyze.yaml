# 项目深度分析 v2.5 — 源码级吸收评估（适配右花 Step 0 需求）
#
# 设计原则：
#   - 静态扫描优先（零 LLM），先摸清项目全貌再让 AI 分析
#   - 语言无关：检测 Go/Python/TypeScript/Rust，自动切换分析策略
#   - 吸收导向：输出格式化能力清单 + 逐能力吸收建议
#   - 闭环落地：分析结果 → 知识库 → insight_followup 待办
#
# 参照：code_deep_analyze.yaml（合并导向）+ absorb_right_flower.yaml（吸收导向）
#
# 流程：
#   1. detect_lang:   检测项目语言和技术栈（零 LLM）
#   2. scan_tree:     扫描源码文件树（零 LLM）
#   3. static_metrics:行数 + 入口点 + 关键模式检测（零 LLM）
#   4. assess:        LLM 综合评估 + 输出能力清单 + 吸收建议
#   5. save:          知识入库 → insight_followup 待办
#
# 触发方式：
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"project_analyze","input":"<项目URL或本地路径>"}}

id: project_analyze

steps:

  # ════════════════════════════════════════════════════════
  # 阶段一：静态检测（零 LLM，产出精确原材料）
  # ════════════════════════════════════════════════════════

  # ── Step 1: 检测语言和技术栈（L3 工具优先）───────────────
  # 先用 code_lang_detect，失败降级 terminal_plugin
  - id: detect_lang
    plugin: memory_plugin
    type: code_lang_detect
    timeout: 20
    on_error: detect_lang_fallback
    inputs:
      root: "${input}"
    next: scan_tree

  # 降级：终端命令检测
  - id: detect_lang_fallback
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 20
    on_error: fetch_readme
    inputs:
      command: >-
        echo "=== GO ===" && ls ${input}/go.mod 2>/dev/null && head -3 ${input}/go.mod 2>/dev/null &&
        echo "=== PYTHON ===" && ls ${input}/setup.py ${input}/pyproject.toml ${input}/requirements.txt 2>/dev/null &&
        echo "=== RUST ===" && ls ${input}/Cargo.toml 2>/dev/null && head -3 ${input}/Cargo.toml 2>/dev/null &&
        echo "=== NODE ===" && ls ${input}/package.json 2>/dev/null && head -10 ${input}/package.json 2>/dev/null
    next: scan_tree

  # ── 降级：远程 URL 用 github_readme ──
  - id: fetch_readme
    plugin: memory_plugin
    type: github_readme
    timeout: 30
    inputs:
      url: "${input}"
    next: assess_remote


  # ── Step 2: 扫描源码文件树（L3 工具优先）─────────────────
  - id: scan_tree
    plugin: memory_plugin
    type: code_tree
    timeout: 20
    on_error: scan_tree_fallback
    inputs:
      root: "${input}"
    next: static_metrics

  # 降级：终端命令扫描
  - id: scan_tree_fallback
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 30
    inputs:
      command: >-
        echo "=== GO FILES ===" && find ${input} -name '*.go' -not -path '*/vendor/*' -not -name '*_test.go' -not -path '*/.git/*' | sort | head -80 &&
        echo "=== PYTHON FILES ===" && find ${input} -name '*.py' -not -path '*/vendor/*' -not -path '*/__pycache__/*' -not -path '*/.git/*' | sort | head -60 &&
        echo "=== KEY FILES ===" && for f in main.go cli.py __init__.py lib.rs index.ts; do
          fpath=$(find ${input} -name "$f" -not -path '*/.git/*' 2>/dev/null | head -1)
          if [ -n "$fpath" ]; then echo "FOUND:$fpath"; fi
        done
    next: static_metrics

  # ── Step 3: 并行静态度量 ─────────────────────────────────
  - id: static_metrics
    type: parallel
    timeout: 30
    steps:
      # 度量 A: 入口文件内容
      - id: entry_point
        plugin: terminal_plugin
        type: terminal_exec
        inputs:
          command: >-
            ENTRY=$(find ${input} -name 'main.go' -not -path '*/.git/*' 2>/dev/null | head -1);
            if [ -z "$ENTRY" ]; then ENTRY=$(find ${input} -name 'cli.py' -not -path '*/.git/*' 2>/dev/null | head -1); fi;
            if [ -z "$ENTRY" ]; then ENTRY=$(find ${input} -name 'lib.rs' -not -path '*/.git/*' 2>/dev/null | head -1); fi;
            if [ -z "$ENTRY" ]; then ENTRY=$(find ${input} -name 'index.ts' -not -path '*/.git/*' 2>/dev/null | head -1); fi;
            if [ -n "$ENTRY" ]; then echo "=== ENTRY: $ENTRY ===" && cat "$ENTRY" | head -100; else echo "(no entry point found)"; fi

      # 度量 B: 导出符号（interface / class / struct / func）
      - id: exports
        plugin: terminal_plugin
        type: terminal_exec
        inputs:
          command: >-
            grep -rn --include='*.go' -E '^(func |type |var |const )' ${input} | grep -v '_test.go' | head -60 &&
            grep -rn --include='*.py' -E '^(def |class |async def )' ${input} | grep -v '__pycache__' | head -60

      # 度量 C: 关键模式检测（架构相关关键词）
      - id: patterns
        plugin: terminal_plugin
        type: terminal_exec
        inputs:
          command: >-
            echo "=== TOOL/PLUGIN ===" && grep -rni --include='*.go' --include='*.py' 'tool\.\|plugin\.\|registry\|interface' ${input} --include='*.go' --include='*.py' | grep -v '_test.go' | grep -v '__pycache__' | grep -v vendor | head -30 &&
            echo "=== IPC/NETWORK ===" && grep -rni --include='*.go' --include='*.py' 'http\.\|rpc\|grpc\|websocket\|tcp\|unix socket' ${input} | grep -v '_test.go' | grep -v '__pycache__' | grep -v vendor | head -20 &&
            echo "=== STORAGE ===" && grep -rni --include='*.go' --include='*.py' 'sql\|memory\|cache\|store\|file\|db\.' ${input} | grep -v '_test.go' | grep -v '__pycache__' | grep -v vendor | head -20

  # ════════════════════════════════════════════════════════
    next: bc_context
  # 阶段二：LLM 综合评估（基于静态度量数据）

  # ── Step 3.5: beishan-core 自身能力上下文（动态采集）──
  # 让 LLM 在评估时知道底座已有什么，避免推荐已有能力。
  # 数据每次运行自动采集，不硬编码。
  - id: bc_context
    plugin: terminal_plugin
    type: terminal_exec
    timeout: 15
    inputs:
      command: >-
        echo "=== TOOL COUNT ===" && grep -rn --include='*.go' 'Register("' internal/tools/ 2>/dev/null | wc -l &&
        echo "=== TOOL CATEGORIES ===" && grep -rn --include='*.go' -E 'func register.*Tools?\(\)' internal/tools/ 2>/dev/null | head -25 &&
        echo "=== INTERNAL PACKAGES ===" && ls -d internal/*/ 2>/dev/null | head -20 &&
        echo "=== RIGHT FLOWERS ===" && ls right_flowers/*.yaml 2>/dev/null | head -5 &&
        echo "=== WORKFLOWS ===" && ls workflows/*.yaml 2>/dev/null | wc -l
  # ════════════════════════════════════════════════════════

    next: assess
  # ── Step 4: LLM 综合评估 + 能力清单 ─────────────────────
  - id: assess
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 300
    retry: 1
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一位软件架构评估专家，任务是评估以下开源项目，为 beishan-core（Go 微内核 + 硬化层 + 工作流引擎）的吸收决策提供依据。

        输出严格 JSON（不加任何其他文字）：

        {
          "project_name": "项目名",
          "language": "检测到的主语言",
          "summary": "项目定位与核心功能（100字内）",

          "architecture": {
            "pattern": "微内核/插件化/单体/分层/事件驱动",
            "description": "架构特点（60字内）"
          },

          "capabilities": [
            {
              "name": "能力名（如：tool_registry、memory_store）",
              "description": "能力说明（30字内）",
              "type": "algorithm/pattern/feature/protocol",
              "language_freedom": "high/medium/low",
              "absorb_priority": "high/medium/low/skip",
              "absorb_reason": "吸收/跳过理由（一句话）",
              "comparison_with_bc": "compared(底座有同类需对比差异) / complementary(可补充底座) / new(底座未覆盖) / skip(生态绑定)",
              "comparison_reason": "与底座已有能力的对比说明（一句话）",

              "go_effort": "用 Go 实现的大致工作量（如：2天、5天、不详）"
            }
          ],

          "go_ecosystem": {
            "compatible": "与 Go 生态的兼容程度（good/fair/poor）",
            "key_imports": ["可能可以直接复用的 Go 库"]
          },

          "absorb_recommendation": "整体吸收建议：部分吸收/仅参考设计/仅协议接入/不推荐",
          "recommended_focus": "最建议吸收的 1-2 个能力（如果整体推荐部分吸收）",
          "risk": "吸收风险说明"

        }


        comparison_with_bc 取值说明：
        - compared: 底座有同类能力，但实现细节不同，需对比差异取长补短（不跳过）
        - complementary: 底座有相关能力但此项目可作为补充
        - new: 底座未覆盖的新能力
        - skip: 生态绑定太重，不吸收

        吸收优先级（基于 comparison_with_bc）：
        - high: complementary 或 new 且语言自由度高
        - medium: complementary 或 new 但实现成本高
        - low: 价值有限
        - skip: 生态绑定不吸收

        能力分类标准：
        - algorithm: 纯算法/数据结构，语言无关，最值得吸收
        - pattern: 设计模式/架构思想，语言无关，值得吸收
        - feature: 功能特性，部分可能绑定在原始语言生态里
        - protocol: 通信协议/接口规范，保持协议调用即可

        吸收优先级：
        - high: 语言无关 + 对 beishan-core 有明显价值
        - medium: 有部分价值但需适配
        - low: 价值有限或实现成本高
        - skip: 不吸收，保持协议调用

        ── 项目路径 ──
        ── beishan-core 当前能力上下文（动态采集）──
        ${steps.bc_context.output}

        ${steps.detect_lang.output}

        ── 文件树 ──
        ${steps.scan_tree.output}

        ── 入口点 ──
        ${steps.static_metrics.output.entry_point}

        ── 导出符号 ──
        ${steps.static_metrics.output.exports}

        ── 关键模式 ──
        ${steps.static_metrics.output.patterns}
    next: save

  # ── 远程 URL 降级：只有 README 的轻量分析 ──
  - id: assess_remote
    provider: deepseek
    plugin: think_plugin
    type: chat
    timeout: 180
    inputs:
      mode: "no_retrieval"
      message: >-
        分析以下开源项目 README，输出能力清单和吸收建议。
        格式同上（JSON），但能力清单基于 README 推断。

        README:
        ${steps.fetch_readme.output.content}
    next: save

  # ════════════════════════════════════════════════════════
  # 阶段三：知识入库 + 洞察闭环
  # ════════════════════════════════════════════════════════

  # ── Step 5: 知识入库 ────────────────────────────────────
  - id: save
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    inputs:
      source_type: "code"
      title: "${steps.assess.output.project_name} 吸收评估"
      summary: >-
        ${steps.assess.output.summary} |
        语言: ${steps.assess.output.language} |
        架构: ${steps.assess.output.architecture.pattern} |
        建议: ${steps.assess.output.absorb_recommendation}
      tags:
        - "${steps.assess.output.language}"
        - "吸收评估"
        - "${steps.assess.output.architecture.pattern}"
      content: "${steps.assess.output}"
    next: followup

  # ── Step 6: 洞察跟进 ──
  - id: followup
    plugin: workflow_plugin
    type: workflow_run
    timeout: 120
    on_error: done
    inputs:
      workflow: "insight_followup"
      input: "${steps.save.output.id}"

  # ── Step 7: 完成 ──
  - id: done
    plugin: think_plugin
    type: chat
    timeout: 30
    inputs:
      mode: "no_retrieval"
      message: >-
        生成分析完成摘要：

        项目：${steps.assess.output.project_name}
        语言：${steps.assess.output.language}
        架构：${steps.assess.output.architecture.pattern}
        能力数：${steps.assess.output.capabilities}

        吸收建议：${steps.assess.output.absorb_recommendation}
        关注焦点：${steps.assess.output.recommended_focus}
        风险：${steps.assess.output.risk}

        已入库。高优先级能力将自动创建待办。
