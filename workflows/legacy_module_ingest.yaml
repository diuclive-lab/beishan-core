# 逐模块入库 v2.5 — 读取模块代码，评分过滤后提取有价值的设计
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: legacy_module_ingest

steps:
  - id: read_code
    plugin: write_plugin
    type: file_parse
    timeout: 15
    retry: 1
    on_error: done
    inputs:
      path: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 2
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个代码质量评估专家。分析这段代码，对关键判断标注 evidence。

        分析维度：
        - title: 模块名
        - summary: 实际做什么
        - quality_score: 0-10
        - quality_issues: 问题列表
        - valuable_patterns: 有价值的设计模式
        - beishan_relevance: high/medium/low/none
        - evidence: E1/E2/E3
        - recommendation: adopt/reference/skip
        - tasks: 行动项
        - tags: 技术标签
        - topics: 领域标签
        - save: true/false

        code:
        ${steps.read_code.output.content}

        注意：quality_score < 3 且 relevance=none 时 save=false
    next: save

  - id: save
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "code"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      raw_ref: "${input}"
      content: "${steps.analyze.output.valuable_patterns}"
