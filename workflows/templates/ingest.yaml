# ═══════════════════════════════════════════════════════════
# 模式: ingest — 内容→分析→结构化入库
# ═══════════════════════════════════════════════════════════
#
# 适用场景: 文章/想法/笔记/聊天 → 自动摘要→标签→待办→保存
# 参考实现: personal_knowledge_ingest
# 步骤数: 3 (analyze → save_knowledge → save_tasks)
#
# 关键设计:
#   - analyze 输出必须是结构化 JSON，后续步骤用 ${steps.analyze.output.field} 提取
#   - knowledge_add 返回 JSON 含 id，用于 todo_add 的 source 字段关联
#   - todo_add 的 source 指向知识条目 ID，实现知识→待办反向追溯

# ─── 骨架 ─────────────────────────────────────────────
# 复制此文件到 workflows/<你的工作流名>.yaml
# 替换所有 TODO 标记

id: TODO_workflow_name        # 工作流名，也是 API 调用的 workflow 参数

steps:
  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 120
    retry: 1                   # DeepSeek 可能偶发失败，建议至少 retry:1
    inputs:
      message: >-
        TODO: 写分析 prompt，输出 JSON 格式
        要求输出格式：
        {
          "title": "标题",
          "summary": "摘要",
          "source_type": "article|idea|chat|note|web",
          "tags": ["标签"],
          "topics": ["主题"],
          "tasks": ["待办"]
        }
        待分析内容：${input}
    next: save_knowledge

  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    inputs:
      source_type: "${steps.analyze.output.source_type}"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      content: "${input}"
    next: save_tasks          # 如果不需要待办，删掉 next 即可在此终止

  - id: save_tasks
    plugin: todo_plugin
    type: todo_add
    timeout: 10
    inputs:
      todos: "${steps.analyze.output.tasks}"
      source: "${steps.save_knowledge.output.id}"

# ─── 变体 ─────────────────────────────────────────────
#
# 无待办版: 删 save_tasks 步骤，save_knowledge 不设 next
# 文件入库: 先用 write_plugin/file_parse 解析，再走 analyze 步骤
# 多源聚合: 先用多个搜索/列出步骤收集数据，再走 analyze 步骤
