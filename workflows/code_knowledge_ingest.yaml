# 本地代码入库 v2.5 — 将代码文件提取为知识条目
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1

id: code_knowledge_ingest

steps:
  - id: parse_file
    plugin: write_plugin
    type: file_parse
    timeout: 15
    retry: 1
    on_error: done
    inputs:
      path: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 2
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个代码分析师。分析以下代码，对关键判断标注 evidence=E1(源码直接体现)/E2(推断)/E3(推测)。

        输出 JSON：
        {
          "title": "文件/模块做什么（10字内）",
          "summary": "核心逻辑（50字内）",
          "tags": ["技术标签"],
          "topics": ["领域标签"],
          "tasks": ["可改进或可移植的行动项"],
          "patterns": "有价值的设计模式",
          "evidence": "E1/E2/E3"
        }

        代码：
        ${steps.parse_file.output.content}
    next: save_knowledge

  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "code"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      raw_ref: "${input}"
      content: "${steps.analyze.output.patterns}"
    next: save_todos

  - id: save_todos
    plugin: todo_plugin
    type: todo_add
    timeout: 10
    on_error: done
    inputs:
      todos: "${steps.analyze.output.tasks}"
      source: "${steps.save_knowledge.output.id}"
