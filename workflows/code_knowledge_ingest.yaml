# 本地代码入库 — 将代码文件提取为知识条目
#
# 流程：
#   1. parse_file: 读取代码文件内容
#   2. analyze:    DeepSeek 分析代码架构和设计模式
#   3. save_knowledge: 入库（source_type=code）
#   4. save_todos:     落地改进/移植行动项
#
# 触发方式:
#   POST /api/chat
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"code_knowledge_ingest","input":"/path/to/code/file.go"}}
#
# 注意事项:
#   - 支持 .go, .py, .js, .rs, .ts, .java 等常见语言文件
#   - 建议只导入核心/有设计价值的文件，不导入工具类、自动生成代码

id: code_knowledge_ingest

steps:
  - id: parse_file
    plugin: write_plugin
    type: file_parse
    timeout: 15
    retry: 1
    inputs:
      path: "${input}"
    next: analyze

  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 180
    retry: 1
    retry_delay: 2
    inputs:
      message: >-
        你是一个代码分析师。分析以下代码，输出严格的 JSON（不加任何其他文字）：

        {
          "title": "文件/模块做什么（10字内）",
          "summary": "核心逻辑（50字内）",
          "tags": ["技术标签（如 go/http/memory）"],
          "topics": ["领域标签（如 plugin/routing/storage）"],
          "tasks": ["可改进或可移植的具体行动项"],
          "patterns": "这段代码里有价值的设计模式"
        }

        代码：
        ${steps.parse_file.output.content}
    next: save_knowledge

  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    inputs:
      source_type: "code"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      raw_ref: "${input}"
      content: "${steps.analyze.output.patterns}"
    next: save_todos

  - id: save_todos
    plugin: todo_plugin
    type: todo_add
    timeout: 10
    inputs:
      todos: "${steps.analyze.output.tasks}"
      source: "${steps.save_knowledge.output.id}"
