# 多模态知识入库 v2.5 — 图片 → AI 分析 → 结构化知识 → 入库
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: multimodal_ingest

steps:
  - id: analyze
    plugin: memory_plugin
    type: vision_analyze
    timeout: 90
    retry: 1
    on_error: report
    inputs:
      image_url: "${input}"
    next: structure

  - id: structure
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        从以下视觉分析结果中提取结构化知识，对关键判断标注 evidence=E1(图中明确可见)/E2(推断)/E3(推测)。

        输出 JSON：
        {
          "title": "知识条目标题（20字以内）",
          "summary": "内容摘要（一句话）",
          "tags": ["标签1", "标签2"],
          "insights": "对这个项目/架构可借鉴的关键洞察",
          "source_type": "code/article/idea/note"
        }

        分析结果：
        ${steps.analyze.output}
    next: store

  - id: store
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "${steps.structure.output.source_type}"
      title: "${steps.structure.output.title}"
      summary: "${steps.structure.output.summary}"
      tags: "${steps.structure.output.tags}"
      content: "${steps.structure.output.insights}"
    next: report

  - id: report
    plugin: think_plugin
    type: chat
    timeout: 30
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        生成多模态入库报告。

        图片：${input}
        入库结果：${steps.store.output}

        入库成功："✅ 图片分析已完成并入库：[标题]"
        失败："❌ 入库失败：[原因]"
