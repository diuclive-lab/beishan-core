# 项目快速扫描 — 并行收集项目元数据
#
# 参考 code_deep_analyze.yaml 的并行静态度量模式。
# 三步并跑：文件树 + 代码统计 + 语言检测
#
# 触发：
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"quick_project_scan","input":"."}}

id: quick_project_scan

steps:
  # ── Step 1: 并行扫描（3 路同时跑）───────────
  - id: parallel_scan
    type: parallel
    timeout: 30
    steps:
      - id: file_tree
        plugin: memory_plugin
        type: code_tree
        inputs:
          root: "${input}"
      - id: code_stats
        plugin: memory_plugin
        type: code_stats
        inputs:
          root: "${input}"
      - id: lang_detect
        plugin: memory_plugin
        type: code_lang_detect
        inputs:
          root: "${input}"
    next: save_reports

  # ── Step 2: 逐个入库 ────────────────────────
  - id: save_reports
    type: parallel
    timeout: 15
    steps:
      - id: save_tree
        plugin: memory_plugin
        type: knowledge_add
        inputs:
          title: "文件树: ${input}"
          summary: "parallel output"
          source_type: "code"
      - id: save_stats
        plugin: memory_plugin
        type: knowledge_add
        inputs:
          title: "代码统计: ${input}"
          summary: "parallel output"
          source_type: "code"
      - id: save_lang
        plugin: memory_plugin
        type: knowledge_add
        inputs:
          title: "语言检测: ${input}"
          summary: "parallel output"
          source_type: "code"
