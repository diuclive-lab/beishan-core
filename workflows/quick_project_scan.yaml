# 项目快速扫描 v2.5 — 并行收集项目元数据
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: quick_project_scan
output_target: chat

steps:
  - id: parallel_scan
    type: parallel
    timeout: 30
    on_error: summarize
    steps:
      - id: file_tree
        plugin: memory_plugin
        type: code_tree
        inputs:
          root: "${input}"
      - id: code_stats
        plugin: memory_plugin
        type: code_stats
        inputs:
          root: "${input}"
      - id: lang_detect
        plugin: memory_plugin
        type: code_lang_detect
        inputs:
          root: "${input}"
    next: summarize

  - id: summarize
    plugin: think_plugin
    type: chat
    timeout: 60
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        基于以下扫描数据，生成项目概要。

        文件树：${steps.parallel_scan.output.file_tree}
        代码统计：${steps.parallel_scan.output.code_stats}
        语言检测：${steps.parallel_scan.output.lang_detect}

        输出结构化的项目概要（中文）。
