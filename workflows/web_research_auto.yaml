# 网页研究自动化 v2.5 — 搜索 → 抓取 → 提取 → 入库（含来源可信度）
#
# 设计原则：
#   - 静态度量优先：先用 web_search + web_fetch 收集原始数据
#   - 来源可信度标注：每个入库条目标注 E1=官方/E2=权威来源/E3=普通网页/E4=未验证
#   - 闭环落地：结果自动入库到知识库
#
# 治理框架引用：
#   - 证据等级 E1-E4 → docs/ABSORPTION_GOVERNANCE.md §1
#
# 流程：
#   1. web_search:   搜索关键词（零 LLM）
#   2. web_fetch:     抓取搜索结果页面内容
#   3. document_extract: 提取正文内容
#   4. save_knowledge: 结果入库（含来源可信度标签）
#
# 触发：
#   {"recipient":"workflow_plugin","type":"workflow_run",
#    "payload":{"workflow":"web_research_auto","input":"搜索关键词"}}

id: web_research_auto

steps:

  # ── Step 1: 网络搜索 ───────────────────────
  - id: web_search
    plugin: search_plugin
    type: web_search
    timeout: 15
    on_error: done
    inputs:
      query: "${input}"
    next: web_fetch

  # ── Step 2: 抓取页面 ───────────────────────
  - id: web_fetch
    plugin: search_plugin
    type: web_fetch
    timeout: 30
    on_error: done
    inputs:
      url: "${steps.web_search.output}"
    next: document_extract

  # ── Step 3: 文档内容提取 ───────────────────
  - id: document_extract
    plugin: memory_plugin
    type: document_extract
    timeout: 15
    on_error: done
    inputs:
      path: "${steps.web_fetch.output}"
    next: save_knowledge

  # ── Step 4: 知识入库（含来源可信度）─────────
  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 10
    on_error: done
    inputs:
      title: "搜索: ${input}"
      summary: "${steps.document_extract.output}"
      source_type: "web"
      tags:
        - "research"
        - "web"
