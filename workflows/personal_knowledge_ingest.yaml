# 个人知识入库 v2.5 — 聊天/文章/想法/笔记 → 结构化知识条目
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: personal_knowledge_ingest
output_target: chat

steps:
  - id: analyze
    plugin: think_plugin
    type: chat
    timeout: 120
    on_error: done
    inputs:
      mode: "no_retrieval"
      message: >-
        你是一个知识管理助手。分析以下内容，输出严格的 JSON：

        {
          "title": "简洁的标题（10字以内）",
          "summary": "一句话摘要（50字以内）",
          "source_type": "article|idea|chat|note|web",
          "tags": ["标签1", "标签2"],
          "topics": ["所属主题"],
          "tasks": ["提取的行动项（无则空数组）"]
        }

        待分析内容：
        ${input}
    next: save_knowledge

  - id: save_knowledge
    plugin: memory_plugin
    type: knowledge_add
    timeout: 15
    on_error: done
    inputs:
      source_type: "${steps.analyze.output.source_type}"
      title: "${steps.analyze.output.title}"
      summary: "${steps.analyze.output.summary}"
      tags: "${steps.analyze.output.tags}"
      topics: "${steps.analyze.output.topics}"
      tasks: "${steps.analyze.output.tasks}"
      content: "${input}"
    next: save_tasks

  - id: save_tasks
    plugin: todo_plugin
    type: todo_add
    timeout: 10
    on_error: done
    inputs:
      todos: "${steps.analyze.output.tasks}"
      source: "${steps.save_knowledge.output.id}"
