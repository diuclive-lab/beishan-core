# CSV 数据管道 v2.5 — 分析 → 预览 → 入库
#
# 治理框架引用：
#   - 证据等级 → docs/ABSORPTION_GOVERNANCE.md §1

id: csv_data_pipeline
output_target: chat

steps:
  - id: csv_profile
    plugin: memory_plugin
    type: csv_profile
    timeout: 10
    on_error: done
    inputs:
      path: "${input}"
    next: csv_sample

  - id: csv_sample
    plugin: memory_plugin
    type: csv_sample
    timeout: 10
    on_error: done
    inputs:
      path: "${input}"
      rows: 5
    next: save_to_kb

  - id: save_to_kb
    plugin: memory_plugin
    type: knowledge_add
    timeout: 10
    on_error: done
    inputs:
      title: "CSV 分析: ${input}"
      summary: "${steps.csv_profile.output}\n\n---\n${steps.csv_sample.output}"
      source_type: "data"
