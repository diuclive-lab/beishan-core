# Legal Review Smoke — 6 cases for legal plugin chain verification
# Created: 2026-05-17
# Purpose: Verify L4 legal_review_plugin + L3 legal plugin chain end-to-end
# Coverage: cold_start, legal_search, clause_analysis, legal_generate_report
#
# Usage:
#   bash eval/scripts/run_legal_smoke.sh [--api URL] [--strict]
#
# Reference: ported from FangLab agent-eval YAML scenario format (66/FangLab/eval/scenarios/smoke_business.yaml)

- id: legal_cold_start_01
  category: legal_smoke
  prompt: "审查这份劳动合同：乙方月工资8000元，试用期6个月，试用期工资4000元。"
  expected_plugin: cold_start_plugin
  expected_type: cold_start
  max_latency_ms: 15000
  notes: "冷启动：识别劳动合同类型、试用期条款"
  expected_evidence:
    min_count: 1
    kind_any_of: ["profile"]
    required_fields: ["contract_type", "legal_area"]
  expected_min_confidence: 0.6

