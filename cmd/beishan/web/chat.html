<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>beishan-core 对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#e6edf3;height:100dvh;display:flex;flex-direction:column;}
.header{padding:12px 16px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:10px;}
.header h1{font-size:16px;font-weight:600;}
#status{width:8px;height:8px;border-radius:50%;background:#d29922;flex-shrink:0;}
#status.ok{background:#3fb950;}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:15px;line-height:1.5;word-wrap:break-word;}
.msg.user{background:#1f6feb;align-self:flex-end;border-bottom-right-radius:4px;}
.msg.bot{background:#21262d;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #30363d;}
.msg.system{background:transparent;align-self:center;font-size:12px;color:#8b949e;}
.msg .time{font-size:10px;color:#8b949e;margin-top:4px;opacity:.7;}
.input-row{display:flex;gap:8px;padding:12px;background:#161b22;border-top:1px solid #30363d;}
.input-row input{flex:1;padding:12px 16px;border-radius:24px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:16px;outline:none;}
.input-row input:focus{border-color:#1f6feb;}
.input-row button{padding:12px 20px;border-radius:24px;border:none;background:#1f6feb;color:#fff;font-size:16px;font-weight:600;cursor:pointer;}
.input-row button:disabled{opacity:.5;}
</style>
</head>
<body>
<div class="header">
  <div id="status"></div>
  <h1>beishan-core</h1>
</div>
<div class="msgs" id="msgs">
  <div class="msg system">已连接</div>
</div>
<div class="input-row">
  <input id="input" type="text" placeholder="输入消息..." autofocus>
  <button id="send" onclick="send()">发送</button>
</div>
<script>
const msgs=document.getElementById('msgs');
const input=document.getElementById('input');
const sendBtn=document.getElementById('send');
const statusDot=document.getElementById('status');
let sessionId=localStorage.getItem('sessionId')||'';

async function send(){
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  sendBtn.disabled=true;
  addMsg(text,'user');
  addMsg('...','bot','thinking');
  try{
    let body=JSON.stringify({message:text});
    if(sessionId) body=JSON.stringify({session_id:sessionId,message:text});
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body});
    const d=await r.json();
    if(d.session_id){sessionId=d.session_id;localStorage.setItem("sessionId",sessionId);}
    const thinking=document.querySelector('.thinking');
    if(thinking) thinking.remove();
    const payload=d.payload||'';
    const txt=typeof payload==='string'?payload:JSON.stringify(payload,null,2);
    addMsg(txt,'bot');
  }catch(e){
    const thinking=document.querySelector('.thinking');
    if(thinking) thinking.remove();
    addMsg('连接失败: '+e.message,'bot');
  }
  sendBtn.disabled=false;
  input.focus();
}

function addMsg(text,role,cls){
  const div=document.createElement('div');
  div.className='msg '+role+(cls?' '+cls:'');
  div.textContent=text;
  const time=document.createElement('div');
  time.className='time';
  time.textContent=new Date().toLocaleTimeString();
  div.appendChild(time);
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

input.addEventListener('keydown',e=>{if(e.key==='Enter') send();});

// Health check
async function checkHealth(){
  try{
    const r=await fetch('/health');
    if(r.ok){statusDot.className='ok';}else{statusDot.className='';}
  }catch(e){statusDot.className='';}
  setTimeout(checkHealth,15000);
}
checkHealth();
</script>
</body>
</html>
