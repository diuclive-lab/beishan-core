name: "hermes_agent"
type: "coding_agent"
protocol: "http"
endpoint: "http://localhost:9532/dispatch"
enabled: true
route_exposed: false
capabilities:
  - code.search
  - agent.chat
  - memory.search
  - memory.store
  - tools.list
  - tool.execute
  - conversations.list
output_format: "json"
safety_level: "sandbox"
